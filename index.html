<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MEDDPIC MAP Manager</title>
  <style>
    :root {
      --bg: #f4f6fb;
      --panel: #ffffff;
      --panel-2: #f9fbff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #dbe3ef;
      --accent: #2563eb;
      --danger: #dc2626;
      --ok: #059669;
      --warning: #d97706;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      flex-wrap: wrap;
    }

    .app-title {
      font-size: 18px;
      font-weight: 700;
      margin-right: 8px;
      white-space: nowrap;
    }

    button, input, select, textarea {
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 14px;
    }

    input:focus, select:focus, textarea:focus, button:focus {
      outline: 2px solid rgba(37, 99, 235, 0.22);
      outline-offset: 1px;
      border-color: var(--accent);
    }

    button {
      cursor: pointer;
      background: #fff;
    }

    button:hover {
      border-color: var(--accent);
      background: #eef4ff;
    }

    .search-input {
      margin-left: auto;
      min-width: 220px;
    }

    .status {
      margin-left: 10px;
      font-size: 12px;
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .status.saved {
      color: var(--ok);
    }

    .status.unsaved {
      color: var(--warning);
    }

    .shell {
      display: grid;
      grid-template-columns: 320px 1fr;
      min-height: 0;
      flex: 1;
    }

    .sidebar {
      border-right: 1px solid var(--border);
      background: var(--panel);
      overflow: auto;
      padding: 10px;
    }

    .sidebar h2 {
      font-size: 13px;
      text-transform: uppercase;
      color: var(--muted);
      margin: 6px 2px 10px;
      letter-spacing: 0.8px;
    }

    .sidebar-controls {
      display: grid;
      gap: 8px;
      margin-bottom: 12px;
    }

    .sidebar-controls label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
      display: block;
    }

    .map-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .map-item {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      background: var(--panel-2);
      cursor: pointer;
      text-align: left;
      width: 100%;
    }

    .map-item.active {
      border-color: var(--accent);
      background: #e9f0ff;
    }

    .map-item .title {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 4px;
    }

    .map-item .meta {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .editor {
      min-width: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 10px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }

    .tab-btn {
      font-size: 13px;
      padding: 8px 10px;
    }

    .tab-btn.active {
      border-color: var(--accent);
      background: #e9f0ff;
      color: #1e3a8a;
      font-weight: 600;
    }

    .tab-panel {
      display: none;
      overflow: auto;
      padding: 16px;
      height: 100%;
    }

    .tab-panel.active { display: block; }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      align-items: start;
    }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-field label {
      font-size: 12px;
      color: var(--muted);
    }

    .required::after {
      content: " *";
      color: var(--danger);
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    .table-wrap {
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: auto;
      background: #fff;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.05);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 860px;
    }

    th, td {
      border-bottom: 1px solid var(--border);
      padding: 8px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #f3f7ff;
      font-size: 12px;
      color: #475569;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    td input, td select {
      width: 100%;
      min-width: 120px;
      padding: 6px 8px;
      background: #fff;
    }

    .table-actions {
      margin-top: 10px;
      display: flex;
      justify-content: flex-start;
    }

    .add-row-btn {
      background: #eff6ff;
      border-color: #bfdbfe;
      color: #1d4ed8;
      font-weight: 600;
    }

    .remove-btn {
      background: #fef2f2;
      border-color: #fecaca;
      color: #991b1b;
    }

    .unsaved-pill {
      color: var(--warning);
      font-size: 12px;
      margin-left: 4px;
      font-weight: 600;
    }

    .saved-pill {
      color: var(--ok);
      font-size: 12px;
      margin-left: 4px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="app-title">MEDDPIC MAP Manager</div>
    <button id="newBtn" type="button">New MAP</button>
    <button id="saveBtn" type="button">Save</button>
    <button id="duplicateBtn" type="button">Duplicate</button>
    <button id="deleteBtn" type="button">Delete</button>
    <button id="exportCsvBtn" type="button">Export CSV</button>
    <button id="exportJsonBtn" type="button">Export JSON Backup</button>
    <button id="importJsonBtn" type="button">Import JSON</button>
    <input id="importJsonInput" type="file" accept="application/json,.json" hidden />
    <input id="searchInput" class="search-input" type="search" placeholder="Search MAPs" />
    <span id="cacheStatus" class="status saved">● Saved</span>
    <span id="unsavedIndicator" class="unsaved-pill" hidden>Unsaved changes</span>
  </header>

  <div class="shell">
    <aside class="sidebar">
      <h2>Saved MAPs</h2>
      <div class="sidebar-controls">
        <div>
          <label for="sortSelect">Sort by</label>
          <select id="sortSelect">
            <option value="updatedAt">Last Updated</option>
            <option value="accountName">Account</option>
            <option value="opportunityName">Opportunity</option>
          </select>
        </div>
        <div>
          <label for="filterHealth">Filter: Overall Health</label>
          <select id="filterHealth">
            <option value="">All</option>
          </select>
        </div>
        <div>
          <label for="filterOwner">Filter: Sales Owner</label>
          <select id="filterOwner">
            <option value="">All</option>
          </select>
        </div>
        <div>
          <label for="filterForecast">Filter: Forecast Category</label>
          <select id="filterForecast">
            <option value="">All</option>
          </select>
        </div>
      </div>
      <div id="mapList" class="map-list"></div>
    </aside>

    <main class="editor">
      <nav id="tabs" class="tabs"></nav>
      <section id="panels" style="flex:1; min-height:0;"></section>
    </main>
  </div>

  <script>
    (() => {
      const DB_NAME = 'meddpic-map-manager';
      const DB_VERSION = 1;
      const STORE_NAME = 'maps';
      const AUTOSAVE_DELAY_MS = 700;

      const FORECAST_OPTIONS = ['Pipeline', 'Best Case', 'Commit', 'Closed Won', 'Closed Lost'];
      const STRENGTH_OPTIONS = ['Red', 'Amber', 'Green'];
      const STATUS_OPTIONS = ['Not Started', 'In Progress', 'Blocked', 'Complete'];
      const INFLUENCE_OPTIONS = ['High', 'Medium', 'Low'];
      const ATTITUDE_OPTIONS = ['Supporter', 'Neutral', 'Skeptic', 'Blocker'];

      const TABS = [
        'Summary',
        'MEDDPIC Scorecard',
        'Metrics',
        'Stakeholders',
        'Decision Process',
        'Paper Process',
        'Competition',
        'Action Plan'
      ];

      const TAB_TO_KEY = {
        'MEDDPIC Scorecard': 'meddpicScorecard',
        'Metrics': 'metrics',
        'Stakeholders': 'stakeholders',
        'Decision Process': 'decisionProcess',
        'Paper Process': 'paperProcess',
        'Competition': 'competition',
        'Action Plan': 'actionPlan'
      };

      const TABLE_SCHEMAS = {
        meddpicScorecard: ['Element', 'Status', 'Evidence', 'Owner', 'Notes'],
        metrics: ['Metric', 'Current', 'Target', 'Impact', 'Notes'],
        stakeholders: ['Name', 'Role', 'Influence', 'Support', 'Notes'],
        decisionProcess: ['Step', 'Owner', 'Due Date', 'Status', 'Notes'],
        paperProcess: ['Document', 'Owner', 'Stage', 'Due Date', 'Notes'],
        competition: ['Competitor', 'Strength', 'Weakness', 'Status', 'Notes'],
        actionPlan: ['Action', 'Owner', 'Due Date', 'Status', 'Notes']
      };

      const TABLE_DROPDOWNS = {
        meddpicScorecard: { 1: STATUS_OPTIONS },
        stakeholders: { 2: INFLUENCE_OPTIONS, 3: ATTITUDE_OPTIONS },
        decisionProcess: { 3: STATUS_OPTIONS },
        competition: { 1: STRENGTH_OPTIONS, 3: STATUS_OPTIONS },
        actionPlan: { 3: STATUS_OPTIONS }
      };

      const state = {
        maps: [],
        currentMapId: null,
        currentMap: null,
        activeTab: 'Summary',
        dirty: false,
        search: '',
        sortBy: 'updatedAt',
        filters: {
          overallHealth: '',
          salesOwner: '',
          forecastCategory: ''
        }
      };

      let autosaveTimer = null;

      const el = {
        mapList: document.getElementById('mapList'),
        tabs: document.getElementById('tabs'),
        panels: document.getElementById('panels'),
        searchInput: document.getElementById('searchInput'),
        saveBtn: document.getElementById('saveBtn'),
        newBtn: document.getElementById('newBtn'),
        duplicateBtn: document.getElementById('duplicateBtn'),
        deleteBtn: document.getElementById('deleteBtn'),
        exportCsvBtn: document.getElementById('exportCsvBtn'),
        exportJsonBtn: document.getElementById('exportJsonBtn'),
        importJsonBtn: document.getElementById('importJsonBtn'),
        importJsonInput: document.getElementById('importJsonInput'),
        unsavedIndicator: document.getElementById('unsavedIndicator'),
        cacheStatus: document.getElementById('cacheStatus'),
        sortSelect: document.getElementById('sortSelect'),
        filterHealth: document.getElementById('filterHealth'),
        filterOwner: document.getElementById('filterOwner'),
        filterForecast: document.getElementById('filterForecast')
      };

      function uid() {
        return crypto.randomUUID();
      }

      function nowIso() {
        return new Date().toISOString();
      }

      function createEmptyMap() {
        const timestamp = nowIso();
        return {
          id: uid(),
          createdAt: timestamp,
          updatedAt: timestamp,
          opportunityName: '',
          accountName: '',
          dealValue: '',
          forecastCategory: '',
          closeDate: '',
          salesOwner: '',
          economicBuyer: '',
          champion: '',
          overallHealth: '',
          notes: '',
          meddpicScorecard: [],
          metrics: [],
          stakeholders: [],
          decisionProcess: [],
          paperProcess: [],
          competition: [],
          actionPlan: []
        };
      }

      function createSampleMap() {
        const sample = createEmptyMap();
        sample.opportunityName = 'Q3 Platform Expansion';
        sample.accountName = 'Acme Financial';
        sample.dealValue = '250000';
        sample.forecastCategory = 'Commit';
        sample.closeDate = '2026-07-30';
        sample.salesOwner = 'Jordan Lee';
        sample.economicBuyer = 'Rita Shah';
        sample.champion = 'Darren Wong';
        sample.overallHealth = 'Amber';
        sample.notes = 'Pilot finished. Procurement review starts next week.';
        sample.meddpicScorecard.push(['Metrics', 'In Progress', 'Baseline validated', 'Jordan Lee', 'Need executive sign-off']);
        sample.metrics.push(['Cycle time reduction', '18%', '30%', 'Operational efficiency', 'Need final benchmark']);
        sample.stakeholders.push(['Rita Shah', 'CFO', 'High', 'Supporter', 'Focused on ROI']);
        sample.decisionProcess.push(['Security review', 'IT Security', '2026-05-10', 'Not Started', 'Questionnaire sent']);
        sample.paperProcess.push(['MSA redlines', 'Legal', 'Drafting', '2026-05-22', 'Customer requested new clause']);
        sample.competition.push(['Contoso Suite', 'Amber', 'Limited automation', 'In Progress', 'Competing at lower price']);
        sample.actionPlan.push(['Schedule EB value recap', 'Jordan Lee', '2026-04-21', 'Not Started', 'Include champion in prep']);
        return sample;
      }

      function openDb() {
        return new Promise((resolve, reject) => {
          const request = indexedDB.open(DB_NAME, DB_VERSION);
          request.onerror = () => reject(request.error);
          request.onupgradeneeded = () => {
            const db = request.result;
            if (!db.objectStoreNames.contains(STORE_NAME)) {
              db.createObjectStore(STORE_NAME, { keyPath: 'id' });
            }
          };
          request.onsuccess = () => resolve(request.result);
        });
      }

      async function idbGetAll() {
        const db = await openDb();
        return new Promise((resolve, reject) => {
          const tx = db.transaction(STORE_NAME, 'readonly');
          const store = tx.objectStore(STORE_NAME);
          const req = store.getAll();
          req.onsuccess = () => resolve(req.result || []);
          req.onerror = () => reject(req.error);
        });
      }

      async function idbPut(mapObj) {
        const db = await openDb();
        return new Promise((resolve, reject) => {
          const tx = db.transaction(STORE_NAME, 'readwrite');
          tx.oncomplete = () => resolve();
          tx.onerror = () => reject(tx.error);
          tx.objectStore(STORE_NAME).put(mapObj);
        });
      }

      async function idbDelete(id) {
        const db = await openDb();
        return new Promise((resolve, reject) => {
          const tx = db.transaction(STORE_NAME, 'readwrite');
          tx.oncomplete = () => resolve();
          tx.onerror = () => reject(tx.error);
          tx.objectStore(STORE_NAME).delete(id);
        });
      }

      async function idbClear() {
        const db = await openDb();
        return new Promise((resolve, reject) => {
          const tx = db.transaction(STORE_NAME, 'readwrite');
          tx.oncomplete = () => resolve();
          tx.onerror = () => reject(tx.error);
          tx.objectStore(STORE_NAME).clear();
        });
      }

      async function idbBulkPut(mapList) {
        const db = await openDb();
        return new Promise((resolve, reject) => {
          const tx = db.transaction(STORE_NAME, 'readwrite');
          tx.oncomplete = () => resolve();
          tx.onerror = () => reject(tx.error);
          const store = tx.objectStore(STORE_NAME);
          mapList.forEach((mapObj) => store.put(mapObj));
        });
      }

      function validateRequired(mapObj, silent = false) {
        const required = ['opportunityName', 'accountName', 'salesOwner'];
        const missing = required.filter((key) => !String(mapObj[key] || '').trim());
        if (missing.length) {
          if (!silent) alert('Required fields missing: ' + missing.join(', '));
          return false;
        }
        return true;
      }

      function markDirty(dirty = true) {
        state.dirty = dirty;
        el.unsavedIndicator.hidden = !dirty;
        if (dirty) {
          el.cacheStatus.textContent = '● Unsaved changes';
          el.cacheStatus.className = 'status unsaved';
        } else {
          el.cacheStatus.textContent = '● Saved';
          el.cacheStatus.className = 'status saved';
        }
      }

      function showActionMessage(message, type = 'success', timeoutMs = 3200) {
        const prefix = type === 'error' ? '● Error:' : '●';
        el.cacheStatus.textContent = `${prefix} ${message}`;
        el.cacheStatus.className = type === 'error' ? 'status unsaved' : 'status saved';
        window.setTimeout(() => {
          if (state.dirty) {
            el.cacheStatus.textContent = '● Unsaved changes';
            el.cacheStatus.className = 'status unsaved';
          } else {
            el.cacheStatus.textContent = '● Saved';
            el.cacheStatus.className = 'status saved';
          }
        }, timeoutMs);
      }

      function dateStamp() {
        const d = new Date();
        const yyyy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const dd = String(d.getDate()).padStart(2, '0');
        return `${yyyy}${mm}${dd}`;
      }

      function sanitizeImportedMap(rawMap) {
        if (!rawMap || typeof rawMap !== 'object') return null;
        const cleaned = { ...createEmptyMap(), ...rawMap };
        cleaned.id = typeof rawMap.id === 'string' && rawMap.id.trim() ? rawMap.id : uid();
        cleaned.createdAt = rawMap.createdAt || nowIso();
        cleaned.updatedAt = rawMap.updatedAt || nowIso();
        Object.keys(TABLE_SCHEMAS).forEach((key) => {
          cleaned[key] = Array.isArray(rawMap[key]) ? rawMap[key] : [];
        });
        return cleaned;
      }

      function csvEscape(value) {
        const str = String(value ?? '');
        if (/[",\n\r]/.test(str)) {
          return `"${str.replaceAll('"', '""')}"`;
        }
        return str;
      }

      function sanitizeFilenamePart(value, fallback) {
        const cleaned = String(value || '')
          .trim()
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, '-')
          .replace(/^-+|-+$/g, '');
        return cleaned || fallback;
      }

      function buildMapCsvRows(mapObj) {
        const rows = [];
        const addSection = (sectionTitle, headers, dataRows) => {
          rows.push([sectionTitle]);
          rows.push(headers);
          dataRows.forEach((r) => rows.push(r));
          rows.push([]);
        };

        addSection(
          'Summary',
          ['Opportunity Name', 'Account Name', 'Deal Value', 'Forecast Category', 'Close Date', 'Sales Owner', 'Economic Buyer', 'Champion', 'Overall Health', 'Notes'],
          [[
            mapObj.opportunityName || '',
            mapObj.accountName || '',
            mapObj.dealValue || '',
            mapObj.forecastCategory || '',
            mapObj.closeDate || '',
            mapObj.salesOwner || '',
            mapObj.economicBuyer || '',
            mapObj.champion || '',
            mapObj.overallHealth || '',
            mapObj.notes || ''
          ]]
        );

        addSection('MEDDPIC Scorecard', TABLE_SCHEMAS.meddpicScorecard, Array.isArray(mapObj.meddpicScorecard) ? mapObj.meddpicScorecard : []);
        addSection('Metrics', TABLE_SCHEMAS.metrics, Array.isArray(mapObj.metrics) ? mapObj.metrics : []);
        addSection('Stakeholders', TABLE_SCHEMAS.stakeholders, Array.isArray(mapObj.stakeholders) ? mapObj.stakeholders : []);
        addSection('Decision Process', TABLE_SCHEMAS.decisionProcess, Array.isArray(mapObj.decisionProcess) ? mapObj.decisionProcess : []);
        addSection('Paper Process', TABLE_SCHEMAS.paperProcess, Array.isArray(mapObj.paperProcess) ? mapObj.paperProcess : []);
        addSection('Competition', TABLE_SCHEMAS.competition, Array.isArray(mapObj.competition) ? mapObj.competition : []);
        addSection('Action Plan', TABLE_SCHEMAS.actionPlan, Array.isArray(mapObj.actionPlan) ? mapObj.actionPlan : []);

        return rows;
      }

      function exportCurrentMapCsv() {
        if (!state.currentMap) {
          showActionMessage('No MAP selected. Please select a MAP first.', 'error');
          return;
        }

        const rows = buildMapCsvRows(state.currentMap);
        const csvText = rows
          .map((row) => row.map((cell) => csvEscape(cell)).join(','))
          .join('\r\n');

        const safeAccount = sanitizeFilenamePart(state.currentMap.accountName, 'unknown-account');
        const safeOpportunity = sanitizeFilenamePart(state.currentMap.opportunityName, 'unknown-opportunity');
        const filename = `meddpic-map-${safeAccount}-${safeOpportunity}-${dateStamp()}.csv`;

        const blob = new Blob([csvText], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
        showActionMessage(`Exported CSV for "${state.currentMap.opportunityName || 'current MAP'}".`);
      }

      async function exportJsonBackup() {
        try {
          const maps = await idbGetAll();
          const payload = {
            version: 1,
            updatedAt: nowIso(),
            maps
          };
          const jsonText = JSON.stringify(payload, null, 2);
          const blob = new Blob([jsonText], { type: 'application/json' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `meddpic-maps-backup-${dateStamp()}.json`;
          document.body.appendChild(a);
          a.click();
          a.remove();
          URL.revokeObjectURL(url);
          showActionMessage(`Exported ${maps.length} MAP(s).`);
        } catch (err) {
          console.error(err);
          showActionMessage('Export failed. Please try again.', 'error');
        }
      }

      function chooseImportMode() {
        if (!state.maps.length) return 'replace';
        const choice = prompt(
          'Import mode:\n- Type REPLACE to overwrite existing MAPs.\n- Type MERGE to merge by MAP id.\n- Type CANCEL to abort.'
        );
        if (!choice) return null;
        const normalized = choice.trim().toLowerCase();
        if (normalized === 'replace') {
          const confirmed = confirm('This will overwrite all existing MAPs in local storage. Continue?');
          return confirmed ? 'replace' : null;
        }
        if (normalized === 'merge') return 'merge';
        return null;
      }

      async function importJsonBackup(file) {
        if (!file) return;
        try {
          const text = await file.text();
          let parsed;
          try {
            parsed = JSON.parse(text);
          } catch (_parseError) {
            showActionMessage('Invalid JSON file. Please select a valid backup.', 'error');
            return;
          }

          if (!parsed || !Array.isArray(parsed.maps)) {
            showActionMessage('Invalid backup format: missing maps array.', 'error');
            return;
          }

          const sanitizedMaps = parsed.maps
            .map((m) => sanitizeImportedMap(m))
            .filter(Boolean);

          const mode = chooseImportMode();
          if (!mode) {
            showActionMessage('Import cancelled.', 'error');
            return;
          }

          if (mode === 'replace') {
            await idbClear();
            await idbBulkPut(sanitizedMaps);
          } else {
            await idbBulkPut(sanitizedMaps);
          }

          const maps = await idbGetAll();
          state.maps = sortedMaps(maps);
          state.currentMapId = state.maps[0]?.id || null;
          state.currentMap = state.maps[0] ? JSON.parse(JSON.stringify(state.maps[0])) : null;
          markDirty(false);
          renderAll();
          showActionMessage(`Imported ${sanitizedMaps.length} MAP(s) using ${mode.toUpperCase()} mode.`);
        } catch (err) {
          console.error(err);
          showActionMessage('Import failed. Please try again.', 'error');
        } finally {
          el.importJsonInput.value = '';
        }
      }

      function sortedMaps(list) {
        const toText = (v) => String(v || '').toLowerCase();
        return [...list].sort((a, b) => {
          if (state.sortBy === 'updatedAt') return new Date(b.updatedAt || 0) - new Date(a.updatedAt || 0);
          return toText(a[state.sortBy]).localeCompare(toText(b[state.sortBy]));
        });
      }

      function filteredMaps() {
        const q = state.search.trim().toLowerCase();
        const maps = state.maps.filter((m) => {
          const searchMatch = !q || [m.opportunityName, m.accountName, m.salesOwner, m.champion]
            .some((v) => String(v || '').toLowerCase().includes(q));
          const healthMatch = !state.filters.overallHealth || m.overallHealth === state.filters.overallHealth;
          const ownerMatch = !state.filters.salesOwner || m.salesOwner === state.filters.salesOwner;
          const forecastMatch = !state.filters.forecastCategory || m.forecastCategory === state.filters.forecastCategory;
          return searchMatch && healthMatch && ownerMatch && forecastMatch;
        });
        return sortedMaps(maps);
      }

      function getCurrentStoredMap() {
        return state.maps.find((m) => m.id === state.currentMapId) || null;
      }

      function setCurrentMap(id) {
        const found = state.maps.find((m) => m.id === id);
        if (!found) return;
        state.currentMapId = id;
        state.currentMap = JSON.parse(JSON.stringify(found));
        markDirty(false);
        renderAll();
      }

      function scheduleAutosave() {
        if (!state.currentMap) return;
        if (autosaveTimer) clearTimeout(autosaveTimer);
        autosaveTimer = setTimeout(async () => {
          await saveCurrent({ silentValidation: true, isAutosave: true });
        }, AUTOSAVE_DELAY_MS);
      }

      function updateCurrentField(key, value) {
        if (!state.currentMap) return;
        state.currentMap[key] = value;
        markDirty(true);
        scheduleAutosave();
        renderSidebar();
      }

      function normalizeRow(arrayKey, rowIndex) {
        const colCount = TABLE_SCHEMAS[arrayKey].length;
        if (!Array.isArray(state.currentMap[arrayKey])) state.currentMap[arrayKey] = [];
        if (!Array.isArray(state.currentMap[arrayKey][rowIndex])) {
          state.currentMap[arrayKey][rowIndex] = Array(colCount).fill('');
        }
        for (let i = 0; i < colCount; i += 1) {
          if (typeof state.currentMap[arrayKey][rowIndex][i] === 'undefined' || state.currentMap[arrayKey][rowIndex][i] === null) {
            state.currentMap[arrayKey][rowIndex][i] = '';
          }
        }
      }

      function updateTableCell(arrayKey, rowIndex, colIndex, value) {
        if (!state.currentMap) return;
        normalizeRow(arrayKey, rowIndex);
        state.currentMap[arrayKey][rowIndex][colIndex] = value;
        markDirty(true);
        scheduleAutosave();
      }

      function addTableRow(arrayKey, focusIndex = null) {
        if (!state.currentMap) return;
        const colCount = TABLE_SCHEMAS[arrayKey].length;
        if (!Array.isArray(state.currentMap[arrayKey])) state.currentMap[arrayKey] = [];
        state.currentMap[arrayKey].push(Array(colCount).fill(''));
        markDirty(true);
        scheduleAutosave();
        renderPanels();
        if (focusIndex !== null) {
          const sel = `[data-cell="${arrayKey}-${focusIndex}-0"]`;
          const firstCell = el.panels.querySelector(sel);
          if (firstCell) firstCell.focus();
        }
      }

      function removeTableRow(arrayKey, index) {
        if (!state.currentMap || !Array.isArray(state.currentMap[arrayKey])) return;
        state.currentMap[arrayKey].splice(index, 1);
        markDirty(true);
        scheduleAutosave();
        renderPanels();
      }

      function fillSelectWithUniqueValues(selectEl, values, currentValue = '') {
        const options = ['<option value="">All</option>'];
        values.forEach((val) => {
          options.push(`<option value="${escapeHtml(val)}">${escapeHtml(val)}</option>`);
        });
        selectEl.innerHTML = options.join('');
        selectEl.value = currentValue;
      }

      function refreshSidebarFilterOptions() {
        const uniqueHealth = [...new Set(state.maps.map((m) => (m.overallHealth || '').trim()).filter(Boolean))].sort();
        const uniqueOwners = [...new Set(state.maps.map((m) => (m.salesOwner || '').trim()).filter(Boolean))].sort();
        const uniqueForecast = [...new Set(state.maps.map((m) => (m.forecastCategory || '').trim()).filter(Boolean))].sort();

        fillSelectWithUniqueValues(el.filterHealth, uniqueHealth, state.filters.overallHealth);
        fillSelectWithUniqueValues(el.filterOwner, uniqueOwners, state.filters.salesOwner);
        fillSelectWithUniqueValues(el.filterForecast, uniqueForecast, state.filters.forecastCategory);
      }

      function renderSidebar() {
        refreshSidebarFilterOptions();
        const maps = filteredMaps();
        el.mapList.innerHTML = '';
        maps.forEach((m) => {
          const item = document.createElement('button');
          item.type = 'button';
          item.className = 'map-item' + (m.id === state.currentMapId ? ' active' : '');
          item.innerHTML = `
            <div class="title">${escapeHtml(m.opportunityName || '(Untitled Opportunity)')}</div>
            <div class="meta">${escapeHtml(m.accountName || '(No Account)')} • ${escapeHtml(m.salesOwner || '(No Owner)')}</div>
            <div class="meta">Champion: ${escapeHtml(m.champion || '-')} • Updated: ${escapeHtml(formatDateTime(m.updatedAt))}</div>
          `;
          item.addEventListener('click', () => setCurrentMap(m.id));
          el.mapList.appendChild(item);
        });
      }

      function formatDateTime(iso) {
        if (!iso) return '-';
        const d = new Date(iso);
        if (Number.isNaN(d.getTime())) return '-';
        return d.toLocaleString();
      }

      function renderTabs() {
        el.tabs.innerHTML = '';
        TABS.forEach((tab) => {
          const b = document.createElement('button');
          b.type = 'button';
          b.className = 'tab-btn' + (state.activeTab === tab ? ' active' : '');
          b.textContent = tab;
          b.addEventListener('click', () => {
            state.activeTab = tab;
            renderPanels();
            renderTabs();
          });
          el.tabs.appendChild(b);
        });
      }

      function createSelectControl(options, value, onChange) {
        const select = document.createElement('select');
        const blank = document.createElement('option');
        blank.value = '';
        blank.textContent = '-- Select --';
        select.appendChild(blank);
        options.forEach((opt) => {
          const option = document.createElement('option');
          option.value = opt;
          option.textContent = opt;
          select.appendChild(option);
        });
        select.value = value || '';
        select.addEventListener('change', (e) => onChange(e.target.value));
        return select;
      }

      function renderSummaryPanel(panel) {
        if (!state.currentMap) return;
        const fields = [
          ['opportunityName', 'Opportunity Name', 'text', true],
          ['accountName', 'Account Name', 'text', true],
          ['dealValue', 'Deal Value', 'number', false],
          ['closeDate', 'Close Date', 'date', false],
          ['salesOwner', 'Sales Owner', 'text', true],
          ['economicBuyer', 'Economic Buyer', 'text', false],
          ['champion', 'Champion', 'text', false]
        ];

        const grid = document.createElement('div');
        grid.className = 'form-grid';

        fields.forEach(([key, label, type, required]) => {
          const wrap = document.createElement('div');
          wrap.className = 'form-field';

          const lab = document.createElement('label');
          lab.textContent = label;
          if (required) lab.classList.add('required');

          const input = document.createElement('input');
          input.type = type;
          input.value = state.currentMap[key] || '';
          input.addEventListener('input', (e) => updateCurrentField(key, e.target.value));

          wrap.append(lab, input);
          grid.appendChild(wrap);
        });

        const forecastWrap = document.createElement('div');
        forecastWrap.className = 'form-field';
        forecastWrap.innerHTML = '<label>Forecast Category</label>';
        forecastWrap.appendChild(createSelectControl(FORECAST_OPTIONS, state.currentMap.forecastCategory, (value) => updateCurrentField('forecastCategory', value)));
        grid.appendChild(forecastWrap);

        const healthWrap = document.createElement('div');
        healthWrap.className = 'form-field';
        healthWrap.innerHTML = '<label>Overall Health</label>';
        healthWrap.appendChild(createSelectControl(STRENGTH_OPTIONS, state.currentMap.overallHealth, (value) => updateCurrentField('overallHealth', value)));
        grid.appendChild(healthWrap);

        const notesWrap = document.createElement('div');
        notesWrap.className = 'form-field';
        notesWrap.style.gridColumn = '1 / -1';

        const notesLabel = document.createElement('label');
        notesLabel.textContent = 'Notes';

        const notes = document.createElement('textarea');
        notes.value = state.currentMap.notes || '';
        notes.addEventListener('input', (e) => updateCurrentField('notes', e.target.value));

        notesWrap.append(notesLabel, notes);
        grid.appendChild(notesWrap);

        panel.appendChild(grid);
      }

      function createCellEditor(arrayKey, rowIndex, colIndex, value) {
        const options = TABLE_DROPDOWNS[arrayKey] && TABLE_DROPDOWNS[arrayKey][colIndex];
        if (options) {
          const select = createSelectControl(options, value, (newValue) => updateTableCell(arrayKey, rowIndex, colIndex, newValue));
          select.dataset.cell = `${arrayKey}-${rowIndex}-${colIndex}`;
          select.addEventListener('keydown', (e) => onCellKeydown(e, arrayKey, rowIndex, colIndex));
          return select;
        }

        const input = document.createElement('input');
        input.type = 'text';
        input.value = value || '';
        input.dataset.cell = `${arrayKey}-${rowIndex}-${colIndex}`;
        input.addEventListener('input', (e) => updateTableCell(arrayKey, rowIndex, colIndex, e.target.value));
        input.addEventListener('keydown', (e) => onCellKeydown(e, arrayKey, rowIndex, colIndex));
        return input;
      }

      function onCellKeydown(e, arrayKey, rowIndex, colIndex) {
        if (e.key !== 'Enter') return;
        e.preventDefault();
        const headers = TABLE_SCHEMAS[arrayKey];
        const isLastCol = colIndex === headers.length - 1;
        const rows = state.currentMap[arrayKey] || [];
        const isLastRow = rowIndex === rows.length - 1;

        if (isLastCol && isLastRow) {
          addTableRow(arrayKey, rowIndex + 1);
          return;
        }

        const nextCol = isLastCol ? 0 : colIndex + 1;
        const nextRow = isLastCol ? rowIndex + 1 : rowIndex;
        const next = el.panels.querySelector(`[data-cell="${arrayKey}-${nextRow}-${nextCol}"]`);
        if (next) next.focus();
      }

      function renderTableRow(arrayKey, headers, row, rowIndex, tbody) {
        const tr = document.createElement('tr');
        headers.forEach((_, colIndex) => {
          const td = document.createElement('td');
          const value = Array.isArray(row) ? row[colIndex] : '';
          td.appendChild(createCellEditor(arrayKey, rowIndex, colIndex, value));
          tr.appendChild(td);
        });

        const tdAction = document.createElement('td');
        const rmBtn = document.createElement('button');
        rmBtn.type = 'button';
        rmBtn.className = 'remove-btn';
        rmBtn.textContent = 'Delete Row';
        rmBtn.addEventListener('click', () => removeTableRow(arrayKey, rowIndex));
        tdAction.appendChild(rmBtn);
        tr.appendChild(tdAction);
        tbody.appendChild(tr);
      }

      function renderTablePanel(panel, arrayKey) {
        if (!state.currentMap) return;

        const headers = TABLE_SCHEMAS[arrayKey];
        if (!Array.isArray(state.currentMap[arrayKey])) state.currentMap[arrayKey] = [];
        const rows = state.currentMap[arrayKey];

        const wrap = document.createElement('div');
        wrap.className = 'table-wrap';
        const table = document.createElement('table');
        const thead = document.createElement('thead');
        const headRow = document.createElement('tr');

        headers.forEach((h) => {
          const th = document.createElement('th');
          th.textContent = h;
          headRow.appendChild(th);
        });
        const thAction = document.createElement('th');
        thAction.textContent = 'Actions';
        headRow.appendChild(thAction);
        thead.appendChild(headRow);

        const tbody = document.createElement('tbody');
        rows.forEach((row, rowIndex) => {
          normalizeRow(arrayKey, rowIndex);
          renderTableRow(arrayKey, headers, row, rowIndex, tbody);
        });

        table.append(thead, tbody);
        wrap.appendChild(table);
        panel.appendChild(wrap);

        const actions = document.createElement('div');
        actions.className = 'table-actions';
        const addBtn = document.createElement('button');
        addBtn.type = 'button';
        addBtn.className = 'add-row-btn';
        addBtn.textContent = 'Add Row';
        addBtn.addEventListener('click', () => addTableRow(arrayKey, rows.length));
        actions.appendChild(addBtn);
        panel.appendChild(actions);
      }

      function renderPanels() {
        el.panels.innerHTML = '';

        TABS.forEach((tab) => {
          const panel = document.createElement('section');
          panel.className = 'tab-panel' + (tab === state.activeTab ? ' active' : '');

          if (!state.currentMap) {
            panel.textContent = 'No MAP selected.';
            el.panels.appendChild(panel);
            return;
          }

          if (tab === 'Summary') {
            renderSummaryPanel(panel);
          } else {
            renderTablePanel(panel, TAB_TO_KEY[tab]);
          }

          el.panels.appendChild(panel);
        });
      }

      function renderAll() {
        renderSidebar();
        renderTabs();
        renderPanels();
      }

      async function saveCurrent({ silentValidation = false, isAutosave = false } = {}) {
        if (!state.currentMap) return;
        const valid = validateRequired(state.currentMap, silentValidation);
        if (!valid) return;

        const toSave = JSON.parse(JSON.stringify(state.currentMap));
        if (!toSave.createdAt) toSave.createdAt = nowIso();
        toSave.updatedAt = nowIso();

        await idbPut(toSave);

        const idx = state.maps.findIndex((m) => m.id === toSave.id);
        if (idx >= 0) {
          state.maps[idx] = toSave;
        } else {
          state.maps.push(toSave);
        }
        state.maps = sortedMaps(state.maps);
        state.currentMap = JSON.parse(JSON.stringify(toSave));
        state.currentMapId = toSave.id;
        markDirty(false);

        if (!isAutosave) {
          renderAll();
        } else {
          renderSidebar();
        }
      }

      async function createNewMap() {
        const mapObj = createEmptyMap();
        state.currentMap = mapObj;
        state.currentMapId = mapObj.id;
        state.maps = sortedMaps([...state.maps, mapObj]);
        markDirty(true);
        renderAll();
      }

      async function duplicateCurrent() {
        if (!state.currentMap) return;
        const cloned = JSON.parse(JSON.stringify(state.currentMap));
        const timestamp = nowIso();
        cloned.id = uid();
        cloned.createdAt = timestamp;
        cloned.updatedAt = timestamp;
        cloned.opportunityName = (cloned.opportunityName || 'Untitled') + ' Copy';
        await idbPut(cloned);
        state.maps = sortedMaps([...state.maps, cloned]);
        setCurrentMap(cloned.id);
      }

      async function deleteCurrent() {
        if (!state.currentMapId) return;
        if (!confirm('Delete this MAP? This cannot be undone.')) return;

        await idbDelete(state.currentMapId);
        state.maps = state.maps.filter((m) => m.id !== state.currentMapId);
        const next = state.maps[0] || null;
        state.currentMapId = next ? next.id : null;
        state.currentMap = next ? JSON.parse(JSON.stringify(next)) : null;
        markDirty(false);
        renderAll();
      }

      function escapeHtml(str) {
        return String(str)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      async function init() {
        try {
          let maps = await idbGetAll();
          if (!maps.length) {
            const sample = createSampleMap();
            await idbPut(sample);
            maps = [sample];
          }

          state.maps = sortedMaps(maps);
          state.currentMapId = state.maps[0]?.id || null;
          state.currentMap = state.maps[0] ? JSON.parse(JSON.stringify(state.maps[0])) : null;
          renderAll();
        } catch (err) {
          console.error(err);
          alert('Failed to initialize local cache.');
        }
      }

      el.searchInput.addEventListener('input', (e) => {
        state.search = e.target.value;
        renderSidebar();
      });

      el.sortSelect.addEventListener('change', (e) => {
        state.sortBy = e.target.value;
        renderSidebar();
      });

      el.filterHealth.addEventListener('change', (e) => {
        state.filters.overallHealth = e.target.value;
        renderSidebar();
      });

      el.filterOwner.addEventListener('change', (e) => {
        state.filters.salesOwner = e.target.value;
        renderSidebar();
      });

      el.filterForecast.addEventListener('change', (e) => {
        state.filters.forecastCategory = e.target.value;
        renderSidebar();
      });

      el.saveBtn.addEventListener('click', () => saveCurrent({}));
      el.newBtn.addEventListener('click', createNewMap);
      el.duplicateBtn.addEventListener('click', duplicateCurrent);
      el.deleteBtn.addEventListener('click', deleteCurrent);
      el.exportCsvBtn.addEventListener('click', exportCurrentMapCsv);
      el.exportJsonBtn.addEventListener('click', exportJsonBackup);
      el.importJsonBtn.addEventListener('click', () => el.importJsonInput.click());
      el.importJsonInput.addEventListener('change', (e) => importJsonBackup(e.target.files && e.target.files[0]));

      init();
    })();
  </script>
</body>
</html>
