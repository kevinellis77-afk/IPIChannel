        `;
        strip.querySelectorAll('[data-meddpic-chip]').forEach((chip) => {
          chip.addEventListener('click', () => goToElement(chip.getAttribute('data-meddpic-chip')));
        });
        panel.appendChild(strip);

        const actions = getNextBestActions(state.currentMap);
        const actionsPanel = document.createElement('section');
        actionsPanel.className = 'next-actions';
        actionsPanel.innerHTML = '<h3>Next Best Actions (Top 3)</h3><div class="next-actions-list"></div>';
        const list = actionsPanel.querySelector('.next-actions-list');
        actions.forEach((action, idx) => {
          const btn = document.createElement('button');
          btn.type = 'button';
          const priorityClass = idx === 0 ? 'priority-high' : idx === 1 ? 'priority-medium' : 'priority-low';
          btn.className = `next-action-item ${priorityClass}`;
          btn.innerHTML = `<span class="rank">${idx + 1}.</span><span>${escapeHtml(action.text)}</span>`;
          btn.addEventListener('click', () => goToElement(action.element));
          list.appendChild(btn);
        });
        if (!actions.length) {
          const done = document.createElement('div');
          done.className = 'meta';
          done.textContent = 'All primary MEDDPIC elements are complete.';
          actionsPanel.appendChild(done);
        }
        panel.appendChild(actionsPanel);
      }

      function renderSummaryPanel(panel) {
        if (!state.currentMap) return;
        const fields = [
          ['opportunityName', 'Opportunity Name', 'text', true],
          ['accountName', 'Account Name', 'text', true],
          ['dealValue', 'Deal Value', 'number', false],
          ['closeDate', 'Close Date', 'date', false],
          ['hubspotDealUrl', 'HubSpot Deal URL', 'url', false],
          ['salesOwner', 'Sales Owner', 'text', true],
          ['economicBuyer', 'Economic Buyer', 'text', false],
          ['champion', 'Champion', 'text', false]
        ];

        const grid = document.createElement('div');
        grid.className = 'form-grid';

        fields.forEach(([key, label, type, required]) => {
          const wrap = document.createElement('div');
          wrap.className = 'form-field';

          const lab = document.createElement('label');
          lab.textContent = label;
          if (required) lab.classList.add('required');

          const input = document.createElement('input');
          input.type = type;
          if (key === 'hubspotDealUrl') {
            input.value = normalizeHubspotDealUrl(state.currentMap[key]);
          } else if (key === 'champion') {
            input.value = getChampionName(state.currentMap);
          } else if (key === 'economicBuyer') {
            input.value = String(state.currentMap[key] || '').trim() || getScorecardOwnerName(state.currentMap, 'Economic Buyer');
          } else {
            input.value = state.currentMap[key] || '';
          }
          if (key === 'hubspotDealUrl') {
            input.placeholder = 'https://app.hubspot.com/contacts/123456789/record/0-3/987654321';
          }

          let validationMessage = null;
          let openLink = null;
          if (key === 'hubspotDealUrl') {
            validationMessage = document.createElement('small');
            validationMessage.className = 'warning-inline';
            validationMessage.hidden = true;
            openLink = document.createElement('a');
            openLink.className = 'inline-link';
            openLink.target = '_blank';
            openLink.rel = 'noopener noreferrer';
            openLink.textContent = 'Open HubSpot Deal';
            openLink.hidden = true;
          }
          input.addEventListener('input', (e) => {
            if (key === 'hubspotDealUrl') {
              const trimmedValue = normalizeHubspotDealUrl(e.target.value);
              e.target.value = trimmedValue;
              updateCurrentField(key, trimmedValue);
              syncHubspotUi(trimmedValue, validationMessage, openLink);
              return;
            }
            updateCurrentField(key, e.target.value);
          });

          wrap.append(lab, input);
          if (key === 'hubspotDealUrl') {
            wrap.append(validationMessage, openLink);
            syncHubspotUi(normalizeHubspotDealUrl(state.currentMap[key]), validationMessage, openLink);
          }
          grid.appendChild(wrap);
        });

        const forecastWrap = document.createElement('div');
        forecastWrap.className = 'form-field';
        forecastWrap.innerHTML = '<label>Forecast Category</label>';
        forecastWrap.appendChild(createSelectControl(FORECAST_OPTIONS, state.currentMap.forecastCategory, (value) => {
          const validation = validateForecastChange(state.currentMap, value);
          if (!validation.valid) {
            alert(`Cannot set forecast to "${value}" yet:\n- ${validation.issues.join('\n- ')}`);
            renderPanels();
            return;
          }
          updateCurrentField('forecastCategory', value);
        }));
        grid.appendChild(forecastWrap);

        const healthWrap = document.createElement('div');
        healthWrap.className = 'form-field';
        const health = calculateDealHealth(state.currentMap);
        healthWrap.innerHTML = `<label>Overall Health (Calculated)</label><div><span class="health-chip health-${health.healthLabel.toLowerCase()}">${health.healthLabel} (${health.score})</span></div>`;
        grid.appendChild(healthWrap);

        const notesWrap = document.createElement('div');
        notesWrap.className = 'form-field';
        notesWrap.style.gridColumn = '1 / -1';

        const notesLabel = document.createElement('label');
        notesLabel.textContent = 'Notes';

        const notes = document.createElement('textarea');
        notes.value = state.currentMap.notes || '';
        notes.addEventListener('input', (e) => updateCurrentField('notes', e.target.value));

        notesWrap.append(notesLabel, notes);
        grid.appendChild(notesWrap);

        panel.appendChild(grid);
      }

      function syncHubspotUi(urlValue, validationEl, openLinkEl) {
        const value = normalizeHubspotDealUrl(urlValue);
        const isBlank = value.length === 0;
        const isValid = isValidHttpUrl(value);

        if (validationEl) {
          validationEl.hidden = isBlank || isValid;
          validationEl.textContent = 'Enter a URL starting with http:// or https://';
        }

        if (openLinkEl) {
          openLinkEl.hidden = !isValid;
          openLinkEl.href = isValid ? value : '#';
        }

        el.panels.querySelectorAll('[data-hubspot-quick-action]').forEach((quickLinkEl) => {
          if (!isValid) {
            quickLinkEl.remove();
            return;
          }
          quickLinkEl.href = value;
        });
      }

      function createCellEditor(arrayKey, rowIndex, colIndex, value) {
        const options = TABLE_DROPDOWNS[arrayKey] && TABLE_DROPDOWNS[arrayKey][colIndex];
        if (options) {
          const select = createSelectControl(options, value, (newValue) => updateTableCell(arrayKey, rowIndex, colIndex, newValue));
          select.dataset.cell = `${arrayKey}-${rowIndex}-${colIndex}`;
          select.addEventListener('keydown', (e) => onCellKeydown(e, arrayKey, rowIndex, colIndex));
          return select;
        }

        const input = document.createElement('input');
        input.type = 'text';
        input.value = value || '';
        input.dataset.cell = `${arrayKey}-${rowIndex}-${colIndex}`;
        input.addEventListener('input', (e) => updateTableCell(arrayKey, rowIndex, colIndex, e.target.value));
        input.addEventListener('keydown', (e) => onCellKeydown(e, arrayKey, rowIndex, colIndex));
        return input;
      }

      function onCellKeydown(e, arrayKey, rowIndex, colIndex) {
        if (e.key !== 'Enter') return;
        e.preventDefault();
        const headers = TABLE_SCHEMAS[arrayKey];
        const isLastCol = colIndex === headers.length - 1;
        const rows = state.currentMap[arrayKey] || [];
        const isLastRow = rowIndex === rows.length - 1;

        if (isLastCol && isLastRow) {
          addTableRow(arrayKey, rowIndex + 1);
          return;
        }

        const nextCol = isLastCol ? 0 : colIndex + 1;
        const nextRow = isLastCol ? rowIndex + 1 : rowIndex;
        const next = el.panels.querySelector(`[data-cell="${arrayKey}-${nextRow}-${nextCol}"]`);
        if (next) next.focus();
      }

      function renderTableRow(arrayKey, headers, row, rowIndex, tbody) {
        const tr = document.createElement('tr');
        if (arrayKey === 'metrics') {
          const missingKeyFields = !hasValue(row?.[2]) || !hasValue(row?.[3]) || !hasValue(row?.[4]);
          if (missingKeyFields) tr.classList.add('metric-row-incomplete');
        }
        headers.forEach((_, colIndex) => {
          const td = document.createElement('td');
          const value = Array.isArray(row) ? row[colIndex] : '';
          if (arrayKey === 'metrics') {
            if (colIndex === 3) {
              const impactNum = parseNumericValue(value);
              const impactClass = impactNum === null ? 'low' : impactNum >= 100000 ? 'high' : impactNum >= 25000 ? 'medium' : 'low';
              const pill = document.createElement('div');
              pill.className = `metric-impact ${impactClass}`;
              pill.textContent = value ? String(value) : 'Missing impact';
              td.appendChild(pill);
            }
            if (colIndex === 4) {
              const normalized = String(value || '').trim().toLowerCase();
              const badge = document.createElement('span');
              badge.className = 'metric-validation-badge ' + (normalized === 'yes'
                ? 'metric-validation-yes'
                : normalized === 'no'
                  ? 'metric-validation-no'
                  : 'metric-validation-unknown');
              badge.textContent = normalized === 'yes' ? '✓ Validated' : normalized === 'no' ? '✕ Not Validated' : '? Unknown';
              td.appendChild(badge);
            }
            if (colIndex === 2) {
              const delta = calculateMetricDelta(row?.[1], row?.[2]);
              if (delta) {
                const deltaBadge = document.createElement('span');
                const qualityClass = delta.pct >= 20 ? 'metric-validation-yes' : delta.pct > 0 ? 'metric-validation-unknown' : 'metric-validation-no';
                deltaBadge.className = `metric-delta-badge ${qualityClass}`;
                deltaBadge.textContent = `${delta.pct >= 0 ? '+' : ''}${delta.pct.toFixed(1)}%`;
                td.appendChild(deltaBadge);
              }
            }
          }
          td.appendChild(createCellEditor(arrayKey, rowIndex, colIndex, value));
          tr.appendChild(td);
        });

        const tdAction = document.createElement('td');
        const rmBtn = document.createElement('button');
        rmBtn.type = 'button';
        rmBtn.className = 'remove-btn';
        rmBtn.textContent = 'Delete Row';
        rmBtn.addEventListener('click', () => removeTableRow(arrayKey, rowIndex));
        tdAction.appendChild(rmBtn);
        tr.appendChild(tdAction);
        tbody.appendChild(tr);
      }

      function renderTablePanel(panel, arrayKey) {
        if (!state.currentMap) return;
        if (arrayKey === 'metrics') {
          renderMetricsSummary(panel);
        }

        const headers = TABLE_SCHEMAS[arrayKey];
        if (!Array.isArray(state.currentMap[arrayKey])) state.currentMap[arrayKey] = [];
        const rows = state.currentMap[arrayKey];

        const wrap = document.createElement('div');
        wrap.className = 'table-wrap';
        const table = document.createElement('table');
        const thead = document.createElement('thead');
        const headRow = document.createElement('tr');

        headers.forEach((h) => {
          const th = document.createElement('th');
          th.textContent = h;
          headRow.appendChild(th);
        });
        const thAction = document.createElement('th');
        thAction.textContent = 'Actions';
        headRow.appendChild(thAction);
        thead.appendChild(headRow);

        const tbody = document.createElement('tbody');
        rows.forEach((row, rowIndex) => {
          normalizeRow(arrayKey, rowIndex);
          renderTableRow(arrayKey, headers, row, rowIndex, tbody);
        });

        table.append(thead, tbody);
        wrap.appendChild(table);
        panel.appendChild(wrap);

        const actions = document.createElement('div');
        actions.className = 'table-actions';
        const addBtn = document.createElement('button');
        addBtn.type = 'button';
        addBtn.className = 'add-row-btn';
        addBtn.textContent = 'Add Row';
        addBtn.addEventListener('click', () => addTableRow(arrayKey, rows.length));
        actions.appendChild(addBtn);
        panel.appendChild(actions);
      }

      function renderPanels() {
        el.panels.innerHTML = '';

        TABS.forEach((tab) => {
          const panel = document.createElement('section');
          panel.className = 'tab-panel' + (tab === state.activeTab ? ' active' : '');

          if (!state.currentMap) {
            panel.textContent = 'No MAP selected.';
            el.panels.appendChild(panel);
            return;
          }

          renderInspectionHeader(panel);

          if (tab === 'Summary') {
            renderSummaryPanel(panel);
          } else {
            if (tab === 'MEDDPIC Scorecard') {
              renderMeddpicBoard(panel);
            }
            renderTablePanel(panel, TAB_TO_KEY[tab]);
          }

          el.panels.appendChild(panel);
        });
      }

      function renderAll() {
        renderSidebar();
        renderTabs();
        renderPanels();
      }

      async function saveCurrent({ silentValidation = false, isAutosave = false } = {}) {
        if (!state.currentMap) return;
        syncSummaryRolesFromScorecard(state.currentMap);
        const valid = validateRequired(state.currentMap, silentValidation);
        if (!valid) {
          markDirty(true);
          return;
        }

        const toSave = JSON.parse(JSON.stringify(state.currentMap));
        if (!toSave.createdAt) toSave.createdAt = nowIso();
        toSave.updatedAt = nowIso();
        toSave.overallHealth = calculateDealHealth(toSave).healthLabel;

        await idbPut(toSave);
        setLocalDataUpdatedAt(toSave.updatedAt);
        markUnsynced(true);

        const idx = state.maps.findIndex((m) => m.id === toSave.id);
        if (idx >= 0) {
          state.maps[idx] = toSave;
        } else {
          state.maps.push(toSave);
        }
        state.maps = sortedMaps(state.maps);
        state.currentMap = JSON.parse(JSON.stringify(toSave));
        state.currentMapId = toSave.id;
        markDirty(false);

        if (!isAutosave) {
          renderAll();
        } else {
          renderSidebar();
        }
      }

      async function createNewMap() {
        const mapObj = createEmptyMap();
        state.currentMap = mapObj;
        state.currentMapId = mapObj.id;
        state.maps = sortedMaps([...state.maps, mapObj]);
        markDirty(true);
        renderAll();
      }

      async function duplicateCurrent() {
        if (!state.currentMap) return;
        const cloned = JSON.parse(JSON.stringify(state.currentMap));
        const timestamp = nowIso();
        cloned.id = uid();
        cloned.createdAt = timestamp;
        cloned.updatedAt = timestamp;
        cloned.opportunityName = (cloned.opportunityName || 'Untitled') + ' Copy';
        await idbPut(cloned);
        setLocalDataUpdatedAt(cloned.updatedAt);
        markUnsynced(true);
        state.maps = sortedMaps([...state.maps, cloned]);
        setCurrentMap(cloned.id);
      }

      async function deleteCurrent() {
        if (!state.currentMapId) return;
        if (!confirm('Delete this MAP? This cannot be undone.')) return;

        await idbDelete(state.currentMapId);
        setLocalDataUpdatedAt(nowIso());
        markUnsynced(true);
        state.maps = state.maps.filter((m) => m.id !== state.currentMapId);
        const next = state.maps[0] || null;
        state.currentMapId = next ? next.id : null;
        state.currentMap = next ? JSON.parse(JSON.stringify(next)) : null;
        markDirty(false);
        renderAll();
      }



      function renderPrintTable(title, headers, rows) {
        if (!Array.isArray(rows) || !rows.length) {
          return `
            <section class="print-section">
              <h2>${escapeHtml(title)}</h2>
              <p class="print-empty">No entries recorded.</p>
            </section>
          `;
        }

        const head = headers.map((h) => `<th>${escapeHtml(h)}</th>`).join('');
        const body = rows
          .map((row) => {
            const safeRow = Array.isArray(row) ? row : [];
            const cells = headers
              .map((_, i) => `<td>${escapeHtml(safeRow[i] || '')}</td>`)
              .join('');
            return `<tr>${cells}</tr>`;
          })
          .join('');

        return `
          <section class="print-section">
            <h2>${escapeHtml(title)}</h2>
            <div class="print-table-wrap">
              <table class="print-table">
                <thead><tr>${head}</tr></thead>
                <tbody>${body}</tbody>
              </table>
            </div>
          </section>
        `;
      }

      function buildPrintReport(mapObj) {
        const health = calculateDealHealth(mapObj);
        const summaryFields = [
          ['Opportunity Name', mapObj.opportunityName],
          ['Account Name', mapObj.accountName],
          ['Deal Value', mapObj.dealValue],
          ['Forecast Category', mapObj.forecastCategory],
          ['Close Date', mapObj.closeDate],
          ['HubSpot Deal URL', normalizeHubspotDealUrl(mapObj.hubspotDealUrl || '')],
          ['Sales Owner', mapObj.salesOwner],
          ['Economic Buyer', mapObj.economicBuyer],
          ['Champion', mapObj.champion],
          ['Overall Health', `${health.healthLabel} (${health.score})`],
          ['Notes', mapObj.notes]
        ];

        const summaryHtml = summaryFields
          .map(([label, value]) => `
            <div class="print-summary-item">
              <strong>${escapeHtml(label)}</strong>
              <span>${escapeHtml(value || '-')}</span>
            </div>
          `)
          .join('');

        const generatedAt = new Date().toLocaleString();
        return `
          <h1>${escapeHtml(mapObj.opportunityName || 'Untitled Opportunity')}</h1>
          <div class="print-report-meta">
            Account: ${escapeHtml(mapObj.accountName || 'N/A')} • Generated: ${escapeHtml(generatedAt)}
          </div>

          <section class="print-section">
            <h2>Summary</h2>
            <div class="print-summary-grid">${summaryHtml}</div>
          </section>

          ${renderPrintTable('MEDDPIC Scorecard', TABLE_SCHEMAS.meddpicScorecard, mapObj.meddpicScorecard)}
          ${renderPrintTable('Metrics', TABLE_SCHEMAS.metrics, mapObj.metrics)}
          ${renderPrintTable('Stakeholders', TABLE_SCHEMAS.stakeholders, mapObj.stakeholders)}
          ${renderPrintTable('Decision Process', TABLE_SCHEMAS.decisionProcess, mapObj.decisionProcess)}
          ${renderPrintTable('Paper Process', TABLE_SCHEMAS.paperProcess, mapObj.paperProcess)}
          ${renderPrintTable('Competition', TABLE_SCHEMAS.competition, mapObj.competition)}
          ${renderPrintTable('Action Plan', TABLE_SCHEMAS.actionPlan, mapObj.actionPlan)}
        `;
      }

      function exportCurrentMapPdf() {
        if (!state.currentMap) {
          showActionMessage('No MAP selected. Please select a MAP first.', 'error');
          return;
        }
        const missingSummary = ['opportunityName', 'accountName', 'salesOwner'].filter((k) => !hasValue(state.currentMap[k]));
        if (missingSummary.length) {
          alert(`PDF export blocked: missing required fields (${missingSummary.join(', ')}).`);
          return;
        }
        const completeness = getMeddpicCompleteness(state.currentMap);
        const qualified = MEDDPIC_ELEMENTS.filter((e) => completeness[e] !== 'missing').length;
        if (qualified < 6) {
          const proceed = confirm(`Qualification warning: only ${qualified}/8 MEDDPIC elements are partial or complete. Export anyway?`);
          if (!proceed) return;
        }
        el.printReport.innerHTML = buildPrintReport(state.currentMap);
        window.print();
      }

      function escapeHtml(str) {
        return String(str)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      async function init() {
        try {
          let maps = await idbGetAll();
          maps = maps.map((m) => sanitizeImportedMap(m)).filter(Boolean);
          if (!maps.length) {
            const sample = createSampleMap();
            await idbPut(sample);
            setLocalDataUpdatedAt(sample.updatedAt);
            maps = [sample];
          }

          state.maps = sortedMaps(maps);
          state.currentMapId = state.maps[0]?.id || null;
          state.currentMap = state.maps[0] ? JSON.parse(JSON.stringify(state.maps[0])) : null;
          const savedGithubConfig = loadGitHubConfig();
          state.sync.config = savedGithubConfig;
          state.sync.connected = isGitHubConnectedConfig(savedGithubConfig);
          state.sync.lastSyncAt = localStorage.getItem(LAST_SYNC_AT_KEY);
          const localUpdated = getLocalDataUpdatedAt();
          markUnsynced(Boolean(localUpdated && (!state.sync.lastSyncAt || new Date(localUpdated) > new Date(state.sync.lastSyncAt))));
          refreshGitHubConnectionUI();
          renderAll();
        } catch (err) {
          console.error(err);
          alert('Failed to initialize local cache.');
        }
      }

      el.searchInput.addEventListener('input', (e) => {
        state.search = e.target.value;
        renderSidebar();
      });

      el.sortSelect.addEventListener('change', (e) => {
        state.sortBy = e.target.value;
        renderSidebar();
      });

      el.filterHealth.addEventListener('change', (e) => {
        state.filters.overallHealth = e.target.value;
        renderSidebar();
      });

      el.filterOwner.addEventListener('change', (e) => {
        state.filters.salesOwner = e.target.value;
        renderSidebar();
      });

      el.filterForecast.addEventListener('change', (e) => {
        state.filters.forecastCategory = e.target.value;
        renderSidebar();
      });

      el.filterToggleBtn.addEventListener('click', () => {
        state.ui.filtersOpen = !state.ui.filtersOpen;
        refreshFilterToggleUi();
      });

      el.newBtn.addEventListener('click', createNewMap);
      el.menuBtn.addEventListener('click', () => {
        setMenuOpen(!state.ui.menuOpen);
      });
      el.duplicateBtn.addEventListener('click', () => {
        closeActionsMenu();
        duplicateCurrent();
      });
      el.deleteBtn.addEventListener('click', () => {
        closeActionsMenu();
        deleteCurrent();
      });
      el.exportCsvBtn.addEventListener('click', () => {
        closeActionsMenu();
        exportCurrentMapCsv();
      });
      el.exportJsonBtn.addEventListener('click', () => {
        closeActionsMenu();
        exportJsonBackup();
      });
      el.importJsonBtn.addEventListener('click', () => {
        closeActionsMenu();
        el.importJsonInput.click();
      });
      el.importJsonInput.addEventListener('change', (e) => importJsonBackup(e.target.files && e.target.files[0]));
      el.exportPdfBtn.addEventListener('click', () => {
        closeActionsMenu();
        exportCurrentMapPdf();
      });
      el.connectGithubBtn.addEventListener('click', connectGithub);
      el.disconnectGithubBtn.addEventListener('click', disconnectGithub);
      el.loadGithubBtn.addEventListener('click', loadFromGithub);
      el.saveGithubBtn.addEventListener('click', saveToGithub);
      el.createGithubFileBtn.addEventListener('click', createGithubDataFile);

      document.addEventListener('click', (e) => {
        if (!state.ui.menuOpen) return;
        const withinMenu = el.actionsMenu.contains(e.target);
        const onMenuButton = el.menuBtn.contains(e.target);
        if (!withinMenu && !onMenuButton) closeActionsMenu();
      });

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && state.ui.menuOpen) {
          closeActionsMenu();
          el.menuBtn.focus();
        }
      });

      init();
    })();
  </script>
</body>
