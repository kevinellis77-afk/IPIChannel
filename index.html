<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exceptional Customer Contact</title>
  <style>
    :root {
      --bg: #f4f6fb;
      --panel: #ffffff;
      --panel-2: #f9fbff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #dbe3ef;
      --accent: #2563eb;
      --danger: #dc2626;
      --ok: #059669;
      --warning: #d97706;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      min-height: 72px;
    }

    .app-title {
      margin-right: 4px;
      white-space: nowrap;
      display: flex;
      align-items: center;
      flex: 0 0 auto;
      width: clamp(188px, 20vw, 252px);
    }

    .app-title svg {
      width: 100%;
      max-height: 58px;
      height: auto;
      display: block;
    }

    .logo-dot {
      fill: #3f4f5e;
    }

    .logo-text {
      fill: #87a5b2;
      font-family: Inter, Arial, sans-serif;
      font-size: 78px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    button, input, select, textarea {
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 14px;
    }

    input:focus, select:focus, textarea:focus, button:focus {
      outline: 2px solid rgba(37, 99, 235, 0.22);
      outline-offset: 1px;
      border-color: var(--accent);
    }

    button {
      cursor: pointer;
      background: #fff;
    }

    button:hover {
      border-color: var(--accent);
      background: #eef4ff;
    }

    .search-input {
      margin-left: auto;
      min-width: 220px;
      max-width: 320px;
    }

    .status {
      margin-left: 10px;
      font-size: 12px;
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .status.saved {
      color: var(--ok);
    }

    .status.unsaved {
      color: var(--warning);
    }

    .status.sync {
      color: #1d4ed8;
    }

    .topbar-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-left: 6px;
      position: relative;
      flex: 0 0 auto;
    }

    .menu-wrap {
      position: relative;
    }

    .menu-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      position: relative;
    }

    .menu-btn.sync-warning {
      border-color: #fca5a5;
      background: #fff1f2;
    }

    .sync-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--warning);
      position: absolute;
      top: 7px;
      right: 8px;
    }

    .sync-dot.warning {
      background: var(--danger);
    }

    .actions-menu {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      z-index: 25;
      min-width: 250px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 14px 28px rgba(2, 8, 23, 0.16);
      padding: 8px;
      display: grid;
      gap: 4px;
    }

    .actions-menu[hidden] {
      display: none;
    }

    .menu-group-label {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin: 4px 6px 2px;
      font-weight: 700;
    }

    .actions-menu button {
      width: 100%;
      text-align: left;
    }

    .menu-divider {
      border: 0;
      border-top: 1px solid var(--border);
      margin: 5px 0;
    }

    .shell {
      display: grid;
      grid-template-columns: 320px 1fr;
      min-height: 0;
      flex: 1;
    }

    .sidebar {
      border-right: 1px solid var(--border);
      background: var(--panel);
      overflow: auto;
      padding: 10px;
    }

    .sidebar h2 {
      font-size: 13px;
      text-transform: uppercase;
      color: var(--muted);
      margin: 6px 2px 10px;
      letter-spacing: 0.8px;
    }

    .sidebar-controls {
      display: grid;
      gap: 8px;
      margin-bottom: 12px;
    }

    .filters-toggle {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      padding: 8px 10px;
      font-weight: 600;
    }

    .filters-badge {
      font-size: 11px;
      color: #1d4ed8;
      border: 1px solid #bfdbfe;
      background: #eff6ff;
      border-radius: 999px;
      padding: 1px 7px;
    }

    .filters-collapsed {
      margin-bottom: 6px;
    }

    .filters-collapsed .sidebar-controls {
      display: none;
    }

    @media (max-width: 960px) {
      .topbar {
        flex-wrap: wrap;
      }
      .search-input {
        order: 20;
        margin-left: 0;
        width: 100%;
        max-width: none;
      }
      .topbar-actions {
        margin-left: auto;
      }
    }

    .sidebar-controls label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
      display: block;
    }

    .map-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .map-item {
      border: 1px solid var(--border);
      border-left: 5px solid #cbd5e1;
      border-radius: 10px;
      padding: 10px;
      background: var(--panel-2);
      cursor: pointer;
      text-align: left;
      width: 100%;
    }

    .map-item.active {
      border-color: var(--accent);
      background: #e9f0ff;
    }

    .map-item .title {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 4px;
    }

    .map-item .meta {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .map-item .meta-wrap {
      display: grid;
      gap: 4px;
      margin-top: 6px;
    }

    .map-item.health-green-accent { border-left-color: #10b981; }
    .map-item.health-amber-accent { border-left-color: #f59e0b; }
    .map-item.health-red-accent { border-left-color: #ef4444; }

    .map-warning-row {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 2px;
    }

    .map-warning-pill {
      font-size: 10px;
      border: 1px solid #fdba74;
      background: #fff7ed;
      color: #9a3412;
      padding: 1px 6px;
      border-radius: 999px;
      max-width: 100%;
    }

    .health-chip {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      border: 1px solid transparent;
    }

    .health-green { background: #ecfdf5; color: #065f46; border-color: #a7f3d0; }
    .health-amber { background: #fffbeb; color: #92400e; border-color: #fcd34d; }
    .health-red { background: #fef2f2; color: #991b1b; border-color: #fecaca; }

    .warning-inline {
      color: #7c2d12;
      font-size: 11px;
    }

    .inline-link {
      font-size: 12px;
      color: #1d4ed8;
      text-decoration: none;
      width: fit-content;
    }

    .inline-link:hover {
      text-decoration: underline;
    }

    .editor {
      min-width: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 10px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }

    .tab-btn {
      font-size: 13px;
      padding: 8px 10px;
    }

    .tab-btn.active {
      border-color: var(--accent);
      background: #e9f0ff;
      color: #1e3a8a;
      font-weight: 600;
    }

    .tab-panel {
      display: none;
      overflow: auto;
      padding: 16px;
      height: 100%;
    }

    .tab-panel.active { display: block; }

    .inspection-strip {
      border: 1px solid var(--border);
      background: var(--panel);
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 12px;
      display: grid;
      gap: 10px;
    }

    .inspection-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(148px, 1fr));
      gap: 8px;
    }

    .inspection-item {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px;
      background: var(--panel-2);
      font-size: 12px;
      min-height: 72px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 4px;
    }

    .inspection-item strong {
      display: block;
      font-size: 10px;
      color: var(--muted);
      margin-bottom: 2px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .inspection-value {
      font-size: 16px;
      font-weight: 700;
      line-height: 1.2;
    }

    .inspection-item.emphasis-health {
      border-width: 2px;
      background: #f8fafc;
    }

    .inspection-item.emphasis-score .inspection-value {
      font-size: 22px;
      font-weight: 800;
      color: #1e3a8a;
    }

    .inspection-item.emphasis-risk .inspection-value {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.35;
    }

    .inspection-item.health-green { border-color: #6ee7b7; background: #ecfdf5; }
    .inspection-item.health-amber { border-color: #fcd34d; background: #fffbeb; }
    .inspection-item.health-red { border-color: #fecaca; background: #fef2f2; }

    .meddpic-chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .status-chip {
      border-radius: 999px;
      font-size: 11px;
      padding: 3px 8px;
      border: 1px solid var(--border);
      background: #fff;
      display: inline-flex;
      gap: 6px;
      align-items: center;
      max-width: 100%;
    }

    .status-chip .chip-name {
      color: #334155;
      font-weight: 600;
      white-space: nowrap;
    }

    .status-chip .chip-state {
      text-transform: capitalize;
      font-weight: 800;
      letter-spacing: 0.2px;
    }

    .status-complete { background: #ecfdf5; border-color: #6ee7b7; color: #065f46; }
    .status-partial { background: #fffbeb; border-color: #fcd34d; color: #92400e; }
    .status-missing { background: #fef2f2; border-color: #fecaca; color: #991b1b; }

    .next-actions {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      background: #f8fbff;
      margin-bottom: 12px;
    }

    .next-actions h3 {
      margin: 0 0 8px;
      font-size: 13px;
      color: #1e3a8a;
    }

    .next-actions-list {
      display: grid;
      gap: 6px;
    }

    .next-action-item {
      width: 100%;
      text-align: left;
      margin: 0;
      background: #fff;
      border-left-width: 4px;
      border-left-style: solid;
      display: grid;
      grid-template-columns: 24px 1fr;
      gap: 8px;
      align-items: start;
      font-size: 13px;
      padding: 8px 10px;
    }

    .next-action-item .rank {
      font-weight: 800;
      color: #475569;
      margin-top: 1px;
    }

    .next-action-item.priority-high { border-left-color: #dc2626; background: #fff7f7; }
    .next-action-item.priority-medium { border-left-color: #d97706; background: #fffaf2; }
    .next-action-item.priority-low { border-left-color: #94a3b8; background: #f8fafc; }

    .meddpic-board {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(185px, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }

    .meddpic-card {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      padding: 8px;
      text-align: left;
      display: grid;
      gap: 6px;
      cursor: pointer;
      min-height: 92px;
    }

    .meddpic-card .name {
      font-size: 12px;
      font-weight: 700;
      color: #1f2937;
    }

    .meddpic-card .support {
      font-size: 11px;
      color: #475569;
      line-height: 1.3;
    }

    .meddpic-card .status-label {
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .meddpic-card.status-complete { border-color: #6ee7b7; background: #ecfdf5; }
    .meddpic-card.status-partial { border-color: #fcd34d; background: #fffbeb; }
    .meddpic-card.status-missing { border-color: #fecaca; background: #fef2f2; }

    .metrics-summary {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      padding: 10px;
      margin-bottom: 12px;
      display: grid;
      gap: 8px;
    }

    .metrics-summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 8px;
    }

    .metric-summary-card {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #f8fafc;
      padding: 8px;
    }

    .metric-summary-card strong {
      display: block;
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.3px;
      margin-bottom: 4px;
    }

    .metric-summary-card .value {
      font-size: 16px;
      font-weight: 700;
    }

    .metric-summary-card.total-impact {
      border-color: #bfdbfe;
      background: #eff6ff;
    }

    .metric-summary-card.total-impact .value {
      font-size: 22px;
      font-weight: 800;
      color: #1d4ed8;
    }

    .metric-summary-card.low-validation {
      border-color: #fecaca;
      background: #fef2f2;
    }

    .metric-validation-badge,
    .metric-delta-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 700;
      border: 1px solid transparent;
      white-space: nowrap;
    }

    .metric-validation-yes { background: #ecfdf5; border-color: #6ee7b7; color: #065f46; }
    .metric-validation-no { background: #fef2f2; border-color: #fecaca; color: #991b1b; }
    .metric-validation-unknown { background: #fff7ed; border-color: #fdba74; color: #9a3412; }

    .metric-impact {
      font-weight: 700;
      font-size: 13px;
      color: #1f2937;
    }

    .metric-impact.high { color: #065f46; }
    .metric-impact.medium { color: #92400e; }
    .metric-impact.low { color: #991b1b; }

    tr.metric-row-incomplete {
      background: #fffaf0;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      align-items: start;
    }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-field label {
      font-size: 12px;
      color: var(--muted);
    }

    .required::after {
      content: " *";
      color: var(--danger);
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    .table-wrap {
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: auto;
      background: #fff;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.05);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 860px;
    }

    th, td {
      border-bottom: 1px solid var(--border);
      padding: 8px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #f3f7ff;
      font-size: 12px;
      color: #475569;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    td input, td select {
      width: 100%;
      min-width: 120px;
      padding: 6px 8px;
      background: #fff;
    }

    .table-actions {
      margin-top: 10px;
      display: flex;
      justify-content: flex-start;
    }

    .add-row-btn {
      background: #eff6ff;
      border-color: #bfdbfe;
      color: #1d4ed8;
      font-weight: 600;
    }

    .remove-btn {
      background: #fef2f2;
      border-color: #fecaca;
      color: #991b1b;
    }

    .sync-pill {
      color: #1d4ed8;
      font-size: 12px;
      margin-left: 4px;
      font-weight: 700;
    }

    .actions-menu .warn-text {
      margin: 4px 6px;
      font-size: 11px;
      padding: 8px;
    }

    .warn-text {
      font-size: 12px;
      color: #7c2d12;
      background: #fff7ed;
      border: 1px solid #fed7aa;
      border-radius: 8px;
      padding: 10px;
      margin: 0;
    }

    .print-report {
      display: none;
      padding: 24px;
      background: #fff;
    }

    .print-report h1 {
      margin: 0 0 6px;
      font-size: 24px;
    }

    .print-report-meta {
      color: var(--muted);
      margin-bottom: 16px;
      font-size: 13px;
    }

    .print-section {
      margin-bottom: 18px;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .print-section h2 {
      margin: 0 0 8px;
      font-size: 18px;
      border-bottom: 1px solid #cbd5e1;
      padding-bottom: 4px;
      color: #111827;
    }

    .print-summary-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px 14px;
    }

    .print-summary-item {
      padding: 4px 0;
      border-bottom: 1px solid #e5e7eb;
      font-size: 13px;
    }

    .print-summary-item strong {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #374151;
      margin-bottom: 2px;
    }

    .print-empty {
      font-size: 13px;
      color: #4b5563;
      font-style: italic;
      margin: 4px 0 0;
    }

    .print-table-wrap {
      border: 1px solid #cbd5e1;
      border-radius: 0;
      overflow: visible;
      box-shadow: none;
      page-break-inside: auto;
    }

    .print-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 0;
    }

    .print-table th,
    .print-table td {
      border: 1px solid #d1d5db;
      padding: 6px;
      font-size: 12px;
      color: #111827;
      word-break: break-word;
      vertical-align: top;
      background: #fff;
    }

    .print-table th {
      background: #fff;
      font-weight: 700;
      position: static;
    }

    .print-table tr,
    .print-table td,
    .print-table th {
      break-inside: avoid;
      page-break-inside: avoid;
    }

    @media print {
      @page {
        margin: 0.5in;
      }

      :root {
        --text: #000;
        --muted: #2f2f2f;
        --border: #c7c7c7;
      }

      body {
        display: block;
        background: #fff;
        color: #000;
        height: auto;
      }

      .topbar,
      .sidebar,
      .tabs,
      .shell {
        display: none !important;
      }

      .print-report {
        display: block;
      }

      .print-report * {
        color: #000 !important;
        box-shadow: none !important;
      }
    }

  </style>
</head>
<body>
  <header class="topbar">
    <div class="app-title" aria-label="IPI Sales logo">
      <svg viewBox="0 0 980 140" role="img" aria-hidden="true" focusable="false">
        <g class="logo-dot" transform="translate(8 9)">
          <circle cx="12" cy="10" r="6"/><circle cx="12" cy="28" r="6"/><circle cx="12" cy="46" r="6"/><circle cx="12" cy="64" r="6"/><circle cx="12" cy="82" r="6"/><circle cx="12" cy="100" r="6"/><circle cx="12" cy="118" r="6"/>
          <circle cx="30" cy="10" r="6"/><circle cx="30" cy="28" r="6"/><circle cx="30" cy="46" r="6"/><circle cx="30" cy="64" r="6"/><circle cx="30" cy="82" r="6"/><circle cx="30" cy="100" r="6"/><circle cx="30" cy="118" r="6"/>
          <circle cx="48" cy="10" r="6"/><circle cx="48" cy="28" r="6"/><circle cx="48" cy="46" r="6"/><circle cx="48" cy="64" r="6"/><circle cx="48" cy="82" r="6"/><circle cx="48" cy="100" r="6"/><circle cx="48" cy="118" r="6"/>
          <circle cx="66" cy="10" r="6"/><circle cx="66" cy="28" r="6"/><circle cx="66" cy="46" r="6"/><circle cx="66" cy="64" r="6"/><circle cx="66" cy="82" r="6"/><circle cx="66" cy="100" r="6"/><circle cx="66" cy="118" r="6"/>

      function uid() {
        return crypto.randomUUID();
      }

      function nowIso() {
        return new Date().toISOString();
      }

      function getLocalDataUpdatedAt() {
        return localStorage.getItem(LOCAL_DATA_UPDATED_AT_KEY) || null;
      }

      function setLocalDataUpdatedAt(value = nowIso()) {
        localStorage.setItem(LOCAL_DATA_UPDATED_AT_KEY, value);
      }

      function getBase64FromUtf8(str) {
        const bytes = new TextEncoder().encode(str);
        let binary = '';
        bytes.forEach((b) => { binary += String.fromCharCode(b); });
        return btoa(binary);
      }

      function getUtf8FromBase64(base64) {
        const normalized = String(base64 || '').replace(/\n/g, '');
        const binary = atob(normalized);
        const bytes = Uint8Array.from(binary, (ch) => ch.charCodeAt(0));
        return new TextDecoder().decode(bytes);
      }

      function createEmptyMap() {
        const timestamp = nowIso();
        return {
          id: uid(),
          createdAt: timestamp,
          updatedAt: timestamp,
          opportunityName: '',

        sample.metrics.push(['Cycle time reduction', '18%', '30%', '$250K annual gain', 'Yes', 'Need final benchmark']);
        sample.stakeholders.push(['Rita Shah', 'CFO', 'High', 'Supporter', 'Focused on ROI']);
        sample.decisionProcess.push(['Security review', 'IT Security', '2026-05-10', 'Not Started', 'Questionnaire sent']);

        sample.actionPlan.push(['Schedule EB value recap', 'Jordan Lee', '2026-04-21', 'Not Started', 'Economic Buyer', 'Include champion in prep']);
        return sample;
      }

      function openDb() {
        return new Promise((resolve, reject) => {
          const request = indexedDB.open(DB_NAME, DB_VERSION);
          request.onerror = () => reject(request.error);
          request.onupgradeneeded = () => {
            const db = request.result;
            if (!db.objectStoreNames.contains(STORE_NAME)) {
              db.createObjectStore(STORE_NAME, { keyPath: 'id' });
            }
          };
          request.onsuccess = () => resolve(request.result);
        });
      }

      async function idbGetAll() {
        const db = await openDb();
        return new Promise((resolve, reject) => {
          const tx = db.transaction(STORE_NAME, 'readonly');
          const store = tx.objectStore(STORE_NAME);
          const req = store.getAll();
          req.onsuccess = () => resolve(req.result || []);
          req.onerror = () => reject(req.error);
        });
      }

      async function idbPut(mapObj) {
        const db = await openDb();
        return new Promise((resolve, reject) => {
          const tx = db.transaction(STORE_NAME, 'readwrite');
          tx.oncomplete = () => resolve();
          tx.onerror = () => reject(tx.error);
          tx.objectStore(STORE_NAME).put(mapObj);
        });
      }

      async function idbDelete(id) {
        const db = await openDb();
        return new Promise((resolve, reject) => {
          const tx = db.transaction(STORE_NAME, 'readwrite');
          tx.oncomplete = () => resolve();
          tx.onerror = () => reject(tx.error);
          tx.objectStore(STORE_NAME).delete(id);
        });
      }

      async function idbClear() {
        const db = await openDb();
        return new Promise((resolve, reject) => {
          const tx = db.transaction(STORE_NAME, 'readwrite');
          tx.oncomplete = () => resolve();
          tx.onerror = () => reject(tx.error);
          tx.objectStore(STORE_NAME).clear();
        });
      }

      async function idbBulkPut(mapList) {
        const db = await openDb();
        return new Promise((resolve, reject) => {
          const tx = db.transaction(STORE_NAME, 'readwrite');
          tx.oncomplete = () => resolve();
          tx.onerror = () => reject(tx.error);
          const store = tx.objectStore(STORE_NAME);
          mapList.forEach((mapObj) => store.put(mapObj));
        });
      }

      function validateRequired(mapObj, silent = false) {
        const required = ['opportunityName', 'accountName', 'salesOwner'];
        const missing = required.filter((key) => !String(mapObj[key] || '').trim());
        if (missing.length) {
          if (!silent) alert('Required fields missing: ' + missing.join(', '));
          return false;
        }
        return true;
      }

      function getRows(mapObj, key) {
        return Array.isArray(mapObj?.[key]) ? mapObj[key] : [];
      }

      function hasValue(value) {
        return String(value ?? '').trim().length > 0;
      }

      function normalizeHubspotDealUrl(value) {
        return String(value ?? '').trim();
      }

      function isValidHttpUrl(value) {
        const normalized = normalizeHubspotDealUrl(value);
        return /^https?:\/\//i.test(normalized);
      }

      function findScorecardRow(mapObj, element) {
        const rows = getRows(mapObj, 'meddpicScorecard');
        return rows.find((row) => String(row?.[0] || '').trim().toLowerCase() === element.toLowerCase()) || null;
      }

      function getScorecardOwnerName(mapObj, element) {
        const row = findScorecardRow(mapObj, element);
        const value = String(row?.[2] || '').trim();
        return value || '';
      }

      function getChampionName(mapObj) {
        return String(mapObj?.champion || '').trim() || getScorecardOwnerName(mapObj, 'Champion');
      }

      function syncSummaryRolesFromScorecard(mapObj) {
        if (!mapObj || typeof mapObj !== 'object') return;
        if (!hasValue(mapObj.economicBuyer)) {
          const ebFromScorecard = getScorecardOwnerName(mapObj, 'Economic Buyer');
          if (ebFromScorecard) mapObj.economicBuyer = ebFromScorecard;
        }
        if (!hasValue(mapObj.champion)) {
          const championFromScorecard = getScorecardOwnerName(mapObj, 'Champion');
          if (championFromScorecard) mapObj.champion = championFromScorecard;
        }
      }

      function getMeddpicCompleteness(mapObj) {
        const metricsRows = getRows(mapObj, 'metrics');
        const decisionRows = getRows(mapObj, 'decisionProcess');
        const paperRows = getRows(mapObj, 'paperProcess');
        const competitionRows = getRows(mapObj, 'competition');
        const stakeholders = getRows(mapObj, 'stakeholders');
        const score = (element) => findScorecardRow(mapObj, element);
        const countFields = (checks) => checks.filter(Boolean).length;
        const toStatus = (scoreCount, total, completeThreshold = total) => {
          if (scoreCount >= completeThreshold) return 'complete';
          if (scoreCount > 0) return 'partial';
          return 'missing';
        };

        const metricsStatus = (() => {
          const complete = metricsRows.some((r) => hasValue(r?.[0]) && hasValue(r?.[2]) && hasValue(r?.[3]) && String(r?.[4] || '').trim().toLowerCase() === 'yes');
          if (complete) return 'complete';
          const partial = metricsRows.some((r) => hasValue(r?.[0]) || hasValue(r?.[2]) || hasValue(r?.[3]) || hasValue(r?.[4]));
          return partial ? 'partial' : 'missing';
        })();

        const economicBuyerRow = score('Economic Buyer');
        const economicBuyerStatus = toStatus(
          countFields([hasValue(mapObj?.economicBuyer), hasValue(economicBuyerRow?.[3])]),
          2
        );

        const decisionCriteriaRow = score('Decision Criteria');
        const decisionCriteriaStatus = toStatus(
          countFields([hasValue(decisionCriteriaRow?.[2]), hasValue(decisionCriteriaRow?.[3])]),
          2
        );

        const decisionProcessStatus = (() => {
          const complete = decisionRows.some((r) => hasValue(r?.[0]) && hasValue(r?.[1]) && hasValue(r?.[2]));
          if (complete) return 'complete';
          const partial = decisionRows.some((r) => hasValue(r?.[0]) || hasValue(r?.[1]) || hasValue(r?.[2]));
          return partial ? 'partial' : 'missing';
        })();

        const paperProcessStatus = (() => {
          const complete = paperRows.some((r) => hasValue(r?.[0]) && hasValue(r?.[1]) && hasValue(r?.[2]));
          if (complete) return 'complete';
          const partial = paperRows.some((r) => hasValue(r?.[0]) || hasValue(r?.[1]) || hasValue(r?.[2]));
          return partial ? 'partial' : 'missing';
        })();

        const painRow = score('Identify Pain');
        const identifyPainStatus = toStatus(
          countFields([hasValue(painRow?.[2]), hasValue(painRow?.[3])]),
          2
        );

        const championName = getChampionName(mapObj);
        const championRow = score('Champion');
        const championScorecardComplete = String(championRow?.[1] || '').trim().toLowerCase() === 'complete';
        const championExists = stakeholders.some((s) => String(s?.[1] || '').trim().toLowerCase() === 'champion')
          || championScorecardComplete
          || hasValue(championRow?.[2])
          || hasValue(championRow?.[3]);
        const championStatus = toStatus(
          countFields([hasValue(championName), championExists]),
          2
        );

        const competitionStatus = (() => {
          const complete = competitionRows.some((r) => hasValue(r?.[0]) && hasValue(r?.[2]) && hasValue(r?.[4]));
          if (complete) return 'complete';
          const partial = competitionRows.some((r) => hasValue(r?.[0]) || hasValue(r?.[2]) || hasValue(r?.[4]));
          return partial ? 'partial' : 'missing';
        })();

        return {
          Metrics: metricsStatus,
          'Economic Buyer': economicBuyerStatus,
          'Decision Criteria': decisionCriteriaStatus,
          'Decision Process': decisionProcessStatus,
          'Paper Process': paperProcessStatus,
          'Identify Pain': identifyPainStatus,
          Champion: championStatus,
          Competition: competitionStatus
        };
      }

      function calculateDealHealth(mapObj) {
        const completeness = getMeddpicCompleteness(mapObj);
        const result = { score: 0, healthLabel: 'Red', warnings: [], strengths: [], missingItems: [] };
        const metricsRows = getRows(mapObj, 'metrics');
        const decisionRows = getRows(mapObj, 'decisionProcess');
        const paperRows = getRows(mapObj, 'paperProcess');
        const competitionRows = getRows(mapObj, 'competition');
        const stakeholders = getRows(mapObj, 'stakeholders');
        const ebRow = findScorecardRow(mapObj, 'Economic Buyer');
        const dcRow = findScorecardRow(mapObj, 'Decision Criteria');
        const painRow = findScorecardRow(mapObj, 'Identify Pain');

        const add = (points, warning, strength, missingItem = '') => {
          result.score += points;
          if (warning) result.warnings.push(warning);
          if (strength) result.strengths.push(strength);
          if (missingItem) result.missingItems.push(missingItem);
        };

        if (!metricsRows.length) add(-2, 'No metrics captured.', '', 'Metrics');
        else if (!metricsRows.some((r) => hasValue(r?.[2]) && hasValue(r?.[3]))) add(-1, 'Metrics are missing target or financial impact.', '', 'Metrics');
        else add(2, '', 'At least one quantified metric is defined.');

        if (!hasValue(mapObj?.economicBuyer)) add(-3, 'Economic Buyer is missing.', '', 'Economic Buyer');
        else if (!hasValue(ebRow?.[3]) && !hasValue(ebRow?.[2])) add(-1, 'Economic Buyer evidence is weak.', '', 'Economic Buyer');
        else add(2, '', 'Economic Buyer identified with evidence.');

        const championName = getChampionName(mapObj);
        const championRow = findScorecardRow(mapObj, 'Champion');
        const championStakeholder = stakeholders.some((s) => String(s?.[1] || '').trim().toLowerCase() === 'champion');
        const championSupport = stakeholders.some((s) => hasValue(s?.[3]));
        const championScorecardComplete = String(championRow?.[1] || '').trim().toLowerCase() === 'complete';
        const championEvidence = championScorecardComplete || hasValue(championRow?.[2]) || hasValue(championRow?.[3]);
        if (!hasValue(championName)) add(-3, 'Champion is missing.', '', 'Champion');
        else if (!championEvidence && (!championStakeholder || !championSupport)) add(-1, 'Champion exists but stakeholder evidence is weak.', '', 'Champion');
        else add(2, '', 'Champion is identified with support signal.');

        if (!dcRow || (!hasValue(dcRow?.[2]) && !hasValue(dcRow?.[3]))) add(-2, 'Decision Criteria not documented.', '', 'Decision Criteria');
        else if (hasValue(dcRow?.[2]) && !hasValue(dcRow?.[3])) add(-1, 'Decision Criteria evidence is missing.', '', 'Decision Criteria');
        else add(1, '', 'Decision Criteria captured with evidence.');

        if (!decisionRows.length) add(-2, 'Decision Process is not mapped.', '', 'Decision Process');
        else if (!decisionRows.some((r) => hasValue(r?.[1]) && hasValue(r?.[2]))) add(-1, 'Decision Process rows lack approver/date.', '', 'Decision Process');
        else add(2, '', 'Decision Process has approvers and dates.');

        if (!paperRows.length) add(-2, 'Paper Process is not mapped.', '', 'Paper Process');
        else if (!paperRows.some((r) => hasValue(r?.[1]) && hasValue(r?.[2]) && hasValue(r?.[3]))) add(-1, 'Paper Process details are incomplete.', '', 'Paper Process');
        else add(1, '', 'Paper Process has ownership and status detail.');

        if (!painRow || (!hasValue(painRow?.[2]) && !hasValue(painRow?.[3]))) add(-3, 'Identify Pain is blank.', '', 'Identify Pain');
        else if (hasValue(painRow?.[2]) && !hasValue(painRow?.[3])) add(-1, 'Pain statement lacks quantified evidence.', '', 'Identify Pain');
        else add(2, '', 'Compelling pain is documented with evidence.');

        if (!competitionRows.length) add(-1, 'No competition record exists.', '', 'Competition');
        else if (!competitionRows.some((r) => hasValue(r?.[2]) && hasValue(r?.[4]))) add(-1, 'Competition strategy is incomplete.', '', 'Competition');
        else add(1, '', 'Competition strategy is documented.');

        result.healthLabel = result.score >= 5 ? 'Green' : result.score >= 1 ? 'Amber' : 'Red';
        result.missingItems = [...new Set(result.missingItems.filter((m) => completeness[m] !== 'complete'))];
        return result;
      }

      function getNextBestActions(mapObj) {
        const completeness = getMeddpicCompleteness(mapObj);
        const actions = {
          'Economic Buyer': 'Identify and engage the economic buyer directly',
          Metrics: 'Quantify business outcomes and validate target metrics with the customer',
          Champion: 'Confirm a true internal champion and assess relationship strength',
          'Decision Process': 'Map decision stages, approvers, and target decision dates',
          'Paper Process': 'Clarify procurement, legal, and security approval steps',
          Competition: 'Document incumbent/competitor position and define competitive strategy',
          'Identify Pain': 'Clarify compelling pain and quantify cost of inaction',
          'Decision Criteria': 'Document decision criteria and secure customer evidence'
        };
        const ranked = MEDDPIC_ACTION_PRIORITIES
          .filter((element) => completeness[element] !== 'complete')
          .sort((a, b) => {
            const scoreA = completeness[a] === 'missing' ? 0 : 1;
            const scoreB = completeness[b] === 'missing' ? 0 : 1;
            return scoreA - scoreB;
          })
          .slice(0, 3)
          .map((element) => ({ element, text: actions[element] }));
        return ranked;
      }

      function parseNumericValue(value) {
        if (value === null || value === undefined) return null;
        const raw = String(value).trim();
        if (!raw) return null;
        const cleaned = raw.replace(/,/g, '').replace(/\$/g, '').replace(/k/ig, '000').replace(/m/ig, '000000');
        const match = cleaned.match(/-?\d+(\.\d+)?/);
        if (!match) return null;
        const num = Number(match[0]);
        return Number.isFinite(num) ? num : null;
      }

      function calculateMetricDelta(baseline, target) {
        const baselineNum = parseNumericValue(baseline);
        const targetNum = parseNumericValue(target);
        if (baselineNum === null || targetNum === null || baselineNum === 0) return null;
        const change = targetNum - baselineNum;
        const pct = (change / Math.abs(baselineNum)) * 100;
        return { change, pct };
      }

      function getMetricSummary(mapObj) {
        const rows = getRows(mapObj, 'metrics');
        let quantifiedTotal = 0;
        let quantifiedCount = 0;
        let validated = 0;
        let deltaSum = 0;
        let deltaCount = 0;
        rows.forEach((row) => {
          const impact = parseNumericValue(row?.[3]);
          if (impact !== null) {
            quantifiedTotal += impact;
            quantifiedCount += 1;
          }
          const validatedRaw = String(row?.[4] || '').trim().toLowerCase();
          if (validatedRaw === 'yes') validated += 1;

          const delta = calculateMetricDelta(row?.[1], row?.[2]);
          if (delta && Number.isFinite(delta.pct)) {
            deltaSum += delta.pct;
            deltaCount += 1;
          }
        });
        return {
          metricCount: rows.length,
          validatedCount: validated,
          validationRatioText: `${validated}/${rows.length || 0}`,
          quantifiedTotal,
          quantifiedCount,
          averageImprovement: deltaCount ? (deltaSum / deltaCount) : null
        };
      }

      function getMeddpicCardSummary(mapObj, element) {
        if (!mapObj) return 'No evidence captured';
        const row = findScorecardRow(mapObj, element);
        const fallback = 'No evidence captured';
        if (element === 'Metrics') {
          const metric = getRows(mapObj, 'metrics').find((r) => hasValue(r?.[0]) || hasValue(r?.[3]) || hasValue(r?.[2]));
          if (!metric) return fallback;
          return [metric?.[0], metric?.[3], metric?.[2]].filter(hasValue).join(' • ').slice(0, 90) || fallback;
        }
        if (element === 'Economic Buyer') {
          if (hasValue(mapObj.economicBuyer)) return `EB: ${String(mapObj.economicBuyer).trim()}`;
        }
        if (element === 'Champion') {
          const championName = getChampionName(mapObj);
          if (hasValue(championName)) return `Champion: ${String(championName).trim()}`;
        }
        if (element === 'Decision Process') {
          const dp = getRows(mapObj, 'decisionProcess').find((r) => hasValue(r?.[0]) || hasValue(r?.[1]));
          if (dp) return [dp?.[0], dp?.[1], dp?.[2]].filter(hasValue).join(' • ').slice(0, 90) || fallback;
        }
        if (element === 'Paper Process') {
          const pp = getRows(mapObj, 'paperProcess').find((r) => hasValue(r?.[0]) || hasValue(r?.[1]));
          if (pp) return [pp?.[0], pp?.[1], pp?.[2]].filter(hasValue).join(' • ').slice(0, 90) || fallback;
        }
        if (element === 'Competition') {
          const comp = getRows(mapObj, 'competition').find((r) => hasValue(r?.[0]) || hasValue(r?.[2]));
          if (comp) return [comp?.[0], comp?.[2], comp?.[4]].filter(hasValue).join(' • ').slice(0, 90) || fallback;
        }
        const summary = [row?.[2], row?.[3], row?.[5]].find(hasValue);
        return summary ? String(summary).slice(0, 90) : fallback;
      }

      function validateForecastChange(mapObj, newForecastCategory) {
        const completeness = getMeddpicCompleteness(mapObj);
        const issues = [];
        const statusOkay = (elName) => completeness[elName] === 'complete';
        if (newForecastCategory === 'Commit') {
          ['Economic Buyer', 'Champion', 'Decision Process', 'Metrics'].forEach((e) => {
            if (!statusOkay(e)) issues.push(`${e} must be complete`);
          });
        } else if (newForecastCategory === 'Best Case') {
          const qualifiedCount = MEDDPIC_ELEMENTS.filter((e) => completeness[e] !== 'missing').length;
          if (qualifiedCount < 4) issues.push('Best Case requires at least 4/8 MEDDPIC elements to be partial or complete');
        }
        return { valid: issues.length === 0, issues, completeness };
      }

      function setLocalStatus(type, customMessage = '') {
        if (statusMessageTimer) {
          clearTimeout(statusMessageTimer);
          statusMessageTimer = null;
        }
        if (type === 'saving') {
          el.cacheStatus.textContent = 'Saving locally…';
          el.cacheStatus.className = 'status';
          return;
        }
        if (type === 'unsaved') {
          el.cacheStatus.textContent = 'Unsaved changes';
          el.cacheStatus.className = 'status unsaved';
          return;
        }
        if (type === 'error') {
          el.cacheStatus.textContent = customMessage || 'Local autosave failed';
          el.cacheStatus.className = 'status unsaved';
          return;
        }
        el.cacheStatus.textContent = 'Saved locally';
        el.cacheStatus.className = 'status saved';
      }

      function markDirty(dirty = true) {
        state.dirty = dirty;
        if (dirty) {
          setLocalStatus('unsaved');
        } else {
          setLocalStatus('saved');
        }
      }

      function showActionMessage(message, type = 'success', timeoutMs = 3200) {
        el.cacheStatus.textContent = message;
        el.cacheStatus.className = type === 'error' ? 'status unsaved' : 'status saved';
        statusMessageTimer = window.setTimeout(() => {
          setLocalStatus(state.dirty ? 'unsaved' : 'saved');
        }, timeoutMs);
      }

      function setSyncError(message = '') {
        state.sync.lastError = message;
        if (!message) {
          el.syncErrorBox.hidden = true;
          el.syncErrorBox.textContent = '';
          el.menuBtn.classList.remove('sync-warning');
          el.menuSyncDot.classList.remove('warning');
          el.menuSyncDot.hidden = !state.sync.unsynced;
          return;
        }
        el.syncErrorBox.hidden = false;
        el.syncErrorBox.textContent = `GitHub sync failed: ${message}`;
        el.menuBtn.classList.add('sync-warning');
        el.menuSyncDot.classList.add('warning');
        el.menuSyncDot.hidden = false;
      }

      function maskToken(token = '') {
        const value = String(token || '').trim();
        if (!value) return '(empty)';
        if (value.length <= 8) return '****';
        return `${value.slice(0, 4)}...${value.slice(-4)}`;
      }

      function sanitizeGitHubConfig(config = {}) {
        return {
          token: String(config.token || '').trim(),
          owner: String(config.owner || '').trim(),
          repo: String(config.repo || '').trim(),
          branch: String(config.branch || '').trim(),
          path: String(config.path || '').trim(),
          connected: Boolean(config.connected),
          connectedAt: config.connectedAt || null
        };
      }

      function isGitHubConnectedConfig(config) {
        if (!config) return false;
        return Boolean(config.connected && config.token && config.owner && config.repo && config.branch && config.path);
      }

      function validateGitHubConfig(config) {
        const cfg = sanitizeGitHubConfig(config);
        const missing = [];
        if (!cfg.token) missing.push('token');
        if (!cfg.owner) missing.push('repo owner');
        if (!cfg.repo) missing.push('repo name');
        if (!cfg.branch) missing.push('branch');
        if (!cfg.path) missing.push('JSON file path');
        if (missing.length) {
          const err = new Error(`Please enter all required GitHub fields: ${missing.join(', ')}.`);
          err.code = 'MISSING_FIELDS';
          throw err;
        }
        return cfg;
      }

      function getGitHubHeaders(token) {
        return {
          Accept: 'application/vnd.github+json',
          Authorization: `Bearer ${String(token || '').trim()}`,
          'X-GitHub-Api-Version': '2022-11-28'
        };
      }

      async function saveGitHubConfig(config) {
        const cfg = sanitizeGitHubConfig(config);
        localStorage.setItem(GITHUB_CONFIG_KEY, JSON.stringify(cfg));
        return cfg;
      }

      function loadGitHubConfig() {
        const raw = localStorage.getItem(GITHUB_CONFIG_KEY);
        if (!raw) return null;
        try {
          return sanitizeGitHubConfig(JSON.parse(raw));
        } catch (_err) {
          return null;
        }
      }

      async function clearGitHubConfig() {
        localStorage.removeItem(GITHUB_CONFIG_KEY);
      }

      function getTrimmedGitHubConfig(config = {}) {
        return sanitizeGitHubConfig(config);
      }

      function markUnsynced(value = true) {
        state.sync.unsynced = value;
        el.syncUnsavedBadge.hidden = !value;
        el.menuSyncDot.hidden = !value && !state.sync.lastError;
        refreshSyncStatus();
      }

      function getAppliedFilterCount() {
        return [state.filters.overallHealth, state.filters.salesOwner, state.filters.forecastCategory]
          .filter((value) => String(value || '').trim().length > 0).length;
      }

      function refreshFilterToggleUi() {
        const activeCount = getAppliedFilterCount();
        el.filterToggleLabel.textContent = state.ui.filtersOpen
          ? 'Hide Filters'
          : activeCount ? `Filters (${activeCount})` : 'Filters';
        el.filterAppliedBadge.hidden = activeCount === 0;
        el.filterAppliedBadge.textContent = activeCount ? `${activeCount} active` : 'Active';
        el.filterToggleBtn.setAttribute('aria-expanded', state.ui.filtersOpen ? 'true' : 'false');
        el.sidebarControls.hidden = !state.ui.filtersOpen;
        const sidebar = el.sidebarControls.closest('.sidebar');
        if (sidebar) {
          sidebar.classList.toggle('filters-collapsed', !state.ui.filtersOpen);
        }
      }

      function setMenuOpen(isOpen) {
        state.ui.menuOpen = Boolean(isOpen);
        el.actionsMenu.hidden = !state.ui.menuOpen;
        el.menuBtn.setAttribute('aria-expanded', state.ui.menuOpen ? 'true' : 'false');
      }

      function closeActionsMenu() {
        setMenuOpen(false);
      }

      function refreshGitHubConnectionUI() {
        const persistedConfig = loadGitHubConfig();
        state.sync.config = persistedConfig;
        state.sync.connected = isGitHubConnectedConfig(persistedConfig);
        const cfg = state.sync.config;
        const connectedText = state.sync.connected && cfg
          ? `GitHub connected (${cfg.owner}/${cfg.repo}@${cfg.branch})`
          : 'GitHub not connected';
        el.syncStatus.textContent = connectedText;
        const lastSyncLabel = state.sync.lastSyncAt ? formatDateTime(state.sync.lastSyncAt) : 'Never';
        el.syncLastSyncInfoMenu.textContent = `Last synced to GitHub: ${lastSyncLabel}`;
      }

      function refreshSyncStatus() {
        refreshGitHubConnectionUI();
      }

      function promptForGithubConfig(existing = null) {
        // Security note: this token is only captured at runtime and is never hardcoded in source.
        const token = prompt('GitHub token (runtime only):', existing?.token || '');
        if (token === null) return null;
        const owner = prompt('GitHub repo owner:', existing?.owner || '');
        if (owner === null) return null;
        const repo = prompt('GitHub repo name:', existing?.repo || '');
        if (repo === null) return null;
        const branch = prompt('GitHub branch:', existing?.branch || 'main');
        if (branch === null) return null;
        const path = prompt('JSON file path in repo:', existing?.path || 'data/meddpic-maps.json');
        if (path === null) return null;
        return {
          token: token.trim(),
          owner: owner.trim(),
          repo: repo.trim(),
          branch: branch.trim(),
          path: path.trim()
        };
      }

      async function connectGithub() {
        console.log('[GitHub] connectGitHub started');
        try {
          const configInput = promptForGithubConfig(state.sync.config || loadGitHubConfig());
          if (!configInput) {
            showActionMessage('GitHub connection cancelled.', 'error');
            return;
          }
          const config = validateGitHubConfig(configInput);
          console.log('[GitHub] collected config', {
            owner: config.owner,
            repo: config.repo,
            branch: config.branch,
            path: config.path,
            token: maskToken(config.token)
          });
          const repoUrl = `https://api.github.com/repos/${encodeURIComponent(config.owner)}/${encodeURIComponent(config.repo)}`;
          console.log('[GitHub] validation request started', repoUrl);
          const repoResponse = await fetch(repoUrl, {
            method: 'GET',
            headers: getGitHubHeaders(config.token)
          });
          console.log('[GitHub] validation response status', repoResponse.status);
          if (repoResponse.status === 401 || repoResponse.status === 403) {
            throw new Error('Token invalid or missing required repository permissions (401/403).');
          }
          if (repoResponse.status === 404) {
            throw new Error('Repository not found or inaccessible (404). Check owner/repo and token access.');
          }
          if (repoResponse.status !== 200) {
            throw new Error(`GitHub validation failed with status ${repoResponse.status}.`);
          }

          let infoMessage = 'GitHub connected successfully.';
          const fileEndpoint = `https://api.github.com/repos/${encodeURIComponent(config.owner)}/${encodeURIComponent(config.repo)}/contents/${config.path.split('/').map(encodeURIComponent).join('/')}?ref=${encodeURIComponent(config.branch)}`;
          const fileResponse = await fetch(fileEndpoint, {
            method: 'GET',
            headers: getGitHubHeaders(config.token)
          });
          if (fileResponse.status === 404) {
            infoMessage = 'Connected to repo, but JSON file not found yet. Use "Create GitHub data file".';
          }

          const persistedConfig = {
            ...config,
            connected: true,
            connectedAt: nowIso()
          };
          await saveGitHubConfig(persistedConfig);
          console.log('[GitHub] config persisted', {
            owner: persistedConfig.owner,
            repo: persistedConfig.repo,
            branch: persistedConfig.branch,
            path: persistedConfig.path,
            token: maskToken(persistedConfig.token)
          });
          setSyncError('');
          refreshGitHubConnectionUI();
          console.log('[GitHub] UI state refreshed');
          showActionMessage(infoMessage);
        } catch (err) {
          console.error('[GitHub] connectGitHub failed with error', err);
          setSyncError(err.message || 'Failed to connect GitHub.');
          refreshGitHubConnectionUI();
          showActionMessage(err.message || 'GitHub connection failed.', 'error');
        }
      }

      async function disconnectGithub() {
        await clearGitHubConfig();
        state.sync.connected = false;
        state.sync.config = null;
        setSyncError('');
        refreshGitHubConnectionUI();
        showActionMessage('GitHub disconnected.');
      }

      function ensureGithubConnected() {
        refreshGitHubConnectionUI();
        if (state.sync.connected && state.sync.config) return true;
        showActionMessage('Connect GitHub first from Storage & Sync.', 'error');
        return false;
      }

      async function githubRequest(config, method, endpoint, body = null) {
        const cfg = getTrimmedGitHubConfig(config || state.sync.config || {});
        const url = `https://api.github.com${endpoint}`;
        const headers = getGitHubHeaders(cfg.token);
        if (body) headers['Content-Type'] = 'application/json';
        const response = await fetch(url, {
          method,
          headers,
          body: body ? JSON.stringify(body) : undefined
        });
        const text = await response.text();
        let payload = null;
        try { payload = text ? JSON.parse(text) : null; } catch (_err) { payload = { message: text }; }
        if (!response.ok) {
          const err = new Error(payload?.message || `${method} ${endpoint} failed`);
          err.status = response.status;
          err.payload = payload;
          throw err;
        }
        return payload;
      }

      function getGithubContentsEndpoint(cfg) {
        const encodedPath = cfg.path.split('/').map(encodeURIComponent).join('/');
        return `/repos/${encodeURIComponent(cfg.owner)}/${encodeURIComponent(cfg.repo)}/contents/${encodedPath}`;
      }

      async function fetchRemoteFileMeta(config = null) {
        const cfg = validateGitHubConfig(getTrimmedGitHubConfig(config || state.sync.config || {}));
        const endpoint = `${getGithubContentsEndpoint(cfg)}?ref=${encodeURIComponent(cfg.branch)}`;
        console.log('[GitHub] fetchRemoteFileMeta start', {
          owner: cfg.owner,
          repo: cfg.repo,
          branch: cfg.branch,
          path: cfg.path,
          token: maskToken(cfg.token)
        });
        try {
          const file = await githubRequest(cfg, 'GET', endpoint);
          const content = file.content ? getUtf8FromBase64(file.content) : '';
          console.log('[GitHub] fetchRemoteFileMeta fetched sha', file.sha || '(none)');
          return {
            exists: true,
            sha: file.sha || null,
            content,
            path: cfg.path,
            branch: cfg.branch
          };
        } catch (err) {
          if (err.status === 404) {
            console.log('[GitHub] fetchRemoteFileMeta file missing (404)', { path: cfg.path, branch: cfg.branch });
            return { exists: false, sha: null, content: null, path: cfg.path, branch: cfg.branch };
          }
          throw err;
        }
      }

      async function fetchGithubDataFile(config = null) {
        const remoteMeta = await fetchRemoteFileMeta(config || state.sync.config);
        if (!remoteMeta.exists) return { exists: false, sha: null, data: null };
        try {
          const parsed = JSON.parse(remoteMeta.content || '{}');
          if (!parsed || !Array.isArray(parsed.maps)) {
            throw new Error('GitHub JSON is invalid. Expected { version, updatedAt, maps }.');
          }
          state.sync.remoteSha = remoteMeta.sha || null;
          return { exists: true, sha: remoteMeta.sha, data: parsed };
        } catch (err) {
          if (err.message.includes('GitHub JSON is invalid')) throw err;
          throw new Error('GitHub JSON is invalid or unreadable.');
        }
      }

      function isGitHubShaConflict(err) {
        const msg = String(err?.message || '');
        return err?.status === 409 || ((err?.status === 422 || err?.status === 400) && /(sha|match|conflict)/i.test(msg));
      }

      function mapGitHubError(err) {
        if (err?.status === 401 || err?.status === 403) return 'GitHub token is invalid or lacks required repository permissions (401/403).';
        if (err?.status === 422) return 'GitHub rejected the request (422). Check branch, path, and required fields.';
        if (isGitHubShaConflict(err)) return 'The GitHub file changed since your last sync. Reload from GitHub or retry save.';
        return err?.message || 'GitHub request failed.';
      }

      async function pushRemoteData(config, data) {
        const cfg = validateGitHubConfig(getTrimmedGitHubConfig(config || {}));
        const latestMeta = await fetchRemoteFileMeta(cfg);
        if (!latestMeta.exists || !latestMeta.sha) {
          return createRemoteFile(cfg, data);
        }
        const body = {
          message: `Update MEDDPIC MAP data ${new Date().toISOString()}`,
          content: getBase64FromUtf8(JSON.stringify(data, null, 2)),
          branch: cfg.branch,
          sha: latestMeta.sha
        };
        console.log('[GitHub] PUT update request', { path: cfg.path, branch: cfg.branch, sha: latestMeta.sha });
        try {
          const response = await githubRequest(cfg, 'PUT', getGithubContentsEndpoint(cfg), body);
          const savedSha = response?.content?.sha || null;
          console.log('[GitHub] PUT success', { status: 'ok', sha: savedSha || '(missing)' });
          state.sync.remoteSha = savedSha;
          return response;
        } catch (err) {
          console.error('[GitHub] PUT failure', err?.status, err?.message, err?.payload || '');
          throw err;
        }
      }

      async function createRemoteFile(config, data) {
        const cfg = validateGitHubConfig(getTrimmedGitHubConfig(config || {}));
        const body = {
          message: `Create MEDDPIC MAP data file ${new Date().toISOString()}`,
          content: getBase64FromUtf8(JSON.stringify(data, null, 2)),
          branch: cfg.branch
        };
        console.log('[GitHub] PUT create request', { path: cfg.path, branch: cfg.branch });
        try {
          const response = await githubRequest(cfg, 'PUT', getGithubContentsEndpoint(cfg), body);
          const savedSha = response?.content?.sha || null;
          console.log('[GitHub] PUT success', { status: 'ok', sha: savedSha || '(missing)' });
          state.sync.remoteSha = savedSha;
          return response;
        } catch (err) {
          console.error('[GitHub] PUT failure', err?.status, err?.message, err?.payload || '');
          throw err;
        }
      }

      async function saveToGitHubWithFreshSha(config, data) {
        const cfg = validateGitHubConfig(getTrimmedGitHubConfig(config || {}));
        console.log('[GitHub] saveToGitHubWithFreshSha start', {
          owner: cfg.owner,
          repo: cfg.repo,
          branch: cfg.branch,
          path: cfg.path,
          token: maskToken(cfg.token)
        });
        const meta = await fetchRemoteFileMeta(cfg);
        if (meta.exists) {
          return pushRemoteData(cfg, data);
        }
        return createRemoteFile(cfg, data);
      }

      function askConflictAction(localUpdatedAt, remoteUpdatedAt) {
        const choice = prompt(
          `Conflict detected.
Local updatedAt: ${localUpdatedAt || 'n/a'}
GitHub updatedAt: ${remoteUpdatedAt || 'n/a'}
Type PUSH for Keep Local and Push, REPLACE for Replace Local from GitHub, or CANCEL.`
        );
        if (!choice) return 'cancel';
        const normalized = choice.trim().toLowerCase();
        if (normalized === 'push') return 'push';
        if (normalized === 'replace') return 'replace';
        return 'cancel';
      }

      async function applyGithubMapsToLocal(githubPayload) {
        const sanitizedMaps = githubPayload.maps.map((m) => sanitizeImportedMap(m)).filter(Boolean);
        await idbClear();
        await idbBulkPut(sanitizedMaps);
        const maps = await idbGetAll();
        state.maps = sortedMaps(maps);
        state.currentMapId = state.maps[0]?.id || null;
        state.currentMap = state.maps[0] ? JSON.parse(JSON.stringify(state.maps[0])) : null;
        markDirty(false);
        markUnsynced(false);
        const updatedAt = githubPayload.updatedAt || nowIso();
        setLocalDataUpdatedAt(updatedAt);
        state.sync.lastSyncAt = nowIso();
        localStorage.setItem(LAST_SYNC_AT_KEY, state.sync.lastSyncAt);
        renderAll();
        refreshSyncStatus();
      }

      async function loadFromGithub() {
        if (!ensureGithubConnected()) return;
        try {
          setSyncError('');
          const remote = await fetchGithubDataFile();
          if (!remote.exists) {
            throw new Error('GitHub file not found. Use "Create GitHub data file" first.');
          }
          const localUpdatedAt = getLocalDataUpdatedAt();
          const remoteUpdatedAt = remote.data.updatedAt || null;
          if (localUpdatedAt && remoteUpdatedAt && new Date(localUpdatedAt) > new Date(remoteUpdatedAt)) {
            const action = askConflictAction(localUpdatedAt, remoteUpdatedAt);
            if (action === 'cancel') return;
            if (action === 'push') {
              await saveToGithub();
              return;
            }
          }
          await applyGithubMapsToLocal(remote.data);
          showActionMessage(`Loaded ${remote.data.maps.length} MAP(s) from GitHub.`);
        } catch (err) {
          console.error(err);
          setSyncError(err.message || 'Failed to load from GitHub.');
          showActionMessage(err.message || 'Load from GitHub failed.', 'error');
        }
      }

      async function saveToGithub() {
        if (!ensureGithubConnected()) return;
        try {
          setSyncError('');
          const cfg = validateGitHubConfig(getTrimmedGitHubConfig(state.sync.config || {}));
          const remote = await fetchGithubDataFile(cfg);
          const localMaps = await idbGetAll();
          const localUpdatedAt = getLocalDataUpdatedAt() || nowIso();
          const remoteUpdatedAt = remote.data?.updatedAt || null;

          if (remote.exists && remoteUpdatedAt && localUpdatedAt && new Date(remoteUpdatedAt) > new Date(localUpdatedAt)) {
            const action = askConflictAction(localUpdatedAt, remoteUpdatedAt);
            if (action === 'cancel') return;
            if (action === 'replace') {
              await applyGithubMapsToLocal(remote.data);
              showActionMessage('Local data replaced from newer GitHub data.');
              return;
            }
          }

          const payload = {
            version: 1,
            updatedAt: nowIso(),
            maps: localMaps
          };
          let saved = null;
          try {
            saved = await saveToGitHubWithFreshSha(cfg, payload);
          } catch (err) {
            if (!isGitHubShaConflict(err)) throw err;
            const choice = prompt(
              'The GitHub file changed since your last sync. Reload from GitHub or retry save.\nType RELOAD, RETRY, or CANCEL.'
            );
            const selected = (choice || '').trim().toLowerCase();
            if (selected === 'reload') {
              await loadFromGithub();
              return;
            }
            if (selected === 'retry') {
              saved = await saveToGitHubWithFreshSha(cfg, payload);
            } else {
              showActionMessage('GitHub save cancelled.', 'error');
              return;
            }
          }
          state.sync.remoteSha = saved?.content?.sha || state.sync.remoteSha || null;
          setLocalDataUpdatedAt(payload.updatedAt);
          state.sync.lastSyncAt = nowIso();
          localStorage.setItem(LAST_SYNC_AT_KEY, state.sync.lastSyncAt);
          markUnsynced(false);
          refreshSyncStatus();
          showActionMessage(`Saved ${localMaps.length} MAP(s) to GitHub.`);
        } catch (err) {
          console.error(err);
          const mappedMessage = mapGitHubError(err);
          setSyncError(mappedMessage);
          showActionMessage(mappedMessage, 'error');
        }
      }

      async function createGithubDataFile() {
        if (!ensureGithubConnected()) return;
        try {
          setSyncError('');
          const cfg = validateGitHubConfig(getTrimmedGitHubConfig(state.sync.config || {}));
          const remote = await fetchGithubDataFile(cfg);
          if (remote.exists) {
            const proceed = confirm('GitHub data file already exists. Overwrite it?');
            if (!proceed) return;
          }
          const localMaps = await idbGetAll();
          const payload = { version: 1, updatedAt: nowIso(), maps: localMaps };
          const saved = remote.exists
            ? await pushRemoteData(cfg, payload)
            : await createRemoteFile(cfg, payload);
          state.sync.remoteSha = saved?.content?.sha || state.sync.remoteSha || null;
          setLocalDataUpdatedAt(payload.updatedAt);
          state.sync.lastSyncAt = nowIso();
          localStorage.setItem(LAST_SYNC_AT_KEY, state.sync.lastSyncAt);
          markUnsynced(false);
          refreshSyncStatus();
          showActionMessage('GitHub data file created.');
        } catch (err) {
          console.error(err);
          const mappedMessage = mapGitHubError(err);
          setSyncError(mappedMessage);
          showActionMessage(mappedMessage, 'error');
        }
      }

      function dateStamp() {
        const d = new Date();
        const yyyy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const dd = String(d.getDate()).padStart(2, '0');
        return `${yyyy}${mm}${dd}`;
      }

      function sanitizeImportedMap(rawMap) {
        if (!rawMap || typeof rawMap !== 'object') return null;
        const cleaned = { ...createEmptyMap(), ...rawMap };
        cleaned.id = typeof rawMap.id === 'string' && rawMap.id.trim() ? rawMap.id : uid();
        cleaned.createdAt = rawMap.createdAt || nowIso();
        cleaned.updatedAt = rawMap.updatedAt || nowIso();
        cleaned.hubspotDealUrl = normalizeHubspotDealUrl(rawMap.hubspotDealUrl || '');
        Object.keys(TABLE_SCHEMAS).forEach((key) => {
          cleaned[key] = Array.isArray(rawMap[key]) ? rawMap[key] : [];
        });
        cleaned.meddpicScorecard = cleaned.meddpicScorecard.map((row) => {
          if (!Array.isArray(row)) return row;
          if (row.length === 5) return [row[0], row[1], '', row[2], row[3], row[4]];
          return row;
        });
        cleaned.metrics = cleaned.metrics.map((row) => {
          if (!Array.isArray(row)) return row;
          if (row.length === 5) return [row[0], row[1], row[2], row[3], '', row[4]];
          return row;
        });
        cleaned.actionPlan = cleaned.actionPlan.map((row) => {
          if (!Array.isArray(row)) return row;
          if (row.length === 5) return [row[0], row[1], row[2], row[3], '', row[4]];
          return row;
        });
        syncSummaryRolesFromScorecard(cleaned);
        return cleaned;
      }

      function csvEscape(value) {
        const str = String(value ?? '');
        if (/[",\n\r]/.test(str)) {
          return `"${str.replaceAll('"', '""')}"`;
        }
        return str;
      }

      function sanitizeFilenamePart(value, fallback) {
        const cleaned = String(value || '')
          .trim()
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, '-')
          .replace(/^-+|-+$/g, '');
        return cleaned || fallback;
      }

      function buildMapCsvRows(mapObj) {
        const rows = [];
        const addSection = (sectionTitle, headers, dataRows) => {
          rows.push([sectionTitle]);
          rows.push(headers);
          dataRows.forEach((r) => rows.push(r));
          rows.push([]);
        };

        addSection(
          'Summary',
          ['Opportunity Name', 'Account Name', 'Deal Value', 'Forecast Category', 'Close Date', 'HubSpot Deal URL', 'Sales Owner', 'Economic Buyer', 'Champion', 'Overall Health', 'Notes'],
          [[
            mapObj.opportunityName || '',
            mapObj.accountName || '',
            mapObj.dealValue || '',
            mapObj.forecastCategory || '',
            mapObj.closeDate || '',
            normalizeHubspotDealUrl(mapObj.hubspotDealUrl || ''),
            mapObj.salesOwner || '',
            mapObj.economicBuyer || '',
            mapObj.champion || '',
            calculateDealHealth(mapObj).healthLabel,
            mapObj.notes || ''
          ]]
        );

        addSection('MEDDPIC Scorecard', TABLE_SCHEMAS.meddpicScorecard, Array.isArray(mapObj.meddpicScorecard) ? mapObj.meddpicScorecard : []);
        addSection('Metrics', TABLE_SCHEMAS.metrics, Array.isArray(mapObj.metrics) ? mapObj.metrics : []);
        addSection('Stakeholders', TABLE_SCHEMAS.stakeholders, Array.isArray(mapObj.stakeholders) ? mapObj.stakeholders : []);
        addSection('Decision Process', TABLE_SCHEMAS.decisionProcess, Array.isArray(mapObj.decisionProcess) ? mapObj.decisionProcess : []);
        addSection('Paper Process', TABLE_SCHEMAS.paperProcess, Array.isArray(mapObj.paperProcess) ? mapObj.paperProcess : []);
        addSection('Competition', TABLE_SCHEMAS.competition, Array.isArray(mapObj.competition) ? mapObj.competition : []);
        addSection('Action Plan', TABLE_SCHEMAS.actionPlan, Array.isArray(mapObj.actionPlan) ? mapObj.actionPlan : []);

        return rows;
      }

      function exportCurrentMapCsv() {
        if (!state.currentMap) {
          showActionMessage('No MAP selected. Please select a MAP first.', 'error');
          return;
        }
        const required = ['opportunityName', 'accountName', 'salesOwner'];
        const missing = required.filter((k) => !hasValue(state.currentMap[k]));
        if (missing.length) {
          const proceed = confirm(`Warning: missing required summary fields for CSV (${missing.join(', ')}). Continue export?`);
          if (!proceed) return;
        }

        const rows = buildMapCsvRows(state.currentMap);
        const csvText = rows
          .map((row) => row.map((cell) => csvEscape(cell)).join(','))
          .join('\r\n');

        const safeAccount = sanitizeFilenamePart(state.currentMap.accountName, 'unknown-account');
        const safeOpportunity = sanitizeFilenamePart(state.currentMap.opportunityName, 'unknown-opportunity');
        const filename = `meddpic-map-${safeAccount}-${safeOpportunity}-${dateStamp()}.csv`;

        const blob = new Blob([csvText], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
        showActionMessage(`Exported CSV for "${state.currentMap.opportunityName || 'current MAP'}".`);
      }

        try {
          const maps = await idbGetAll();
          const payload = {
            version: 1,
            updatedAt: nowIso(),
            maps
          };
          const jsonText = JSON.stringify(payload, null, 2);

          showActionMessage('Export failed. Please try again.', 'error');
        }

      function chooseImportMode() {
        if (!state.maps.length) return 'replace';
        const choice = prompt(
          'Import mode:\n- Type REPLACE to overwrite existing MAPs.\n- Type MERGE to merge by MAP id.\n- Type CANCEL to abort.'
        );
        if (!choice) return null;
        const normalized = choice.trim().toLowerCase();
        if (normalized === 'replace') {
          const confirmed = confirm('This will overwrite all existing MAPs in local storage. Continue?');
          return confirmed ? 'replace' : null;
        }
        if (normalized === 'merge') return 'merge';
        return null;
      }

      async function importJsonBackup(file) {
        if (!file) return;
        try {
          const text = await file.text();
          let parsed;
          try {
            parsed = JSON.parse(text);
          } catch (_parseError) {
            showActionMessage('Invalid JSON file. Please select a valid backup.', 'error');
            return;
          }

          if (!parsed || !Array.isArray(parsed.maps)) {
            showActionMessage('Invalid backup format: missing maps array.', 'error');
            return;
          }

          const sanitizedMaps = parsed.maps
            .map((m) => sanitizeImportedMap(m))
            .filter(Boolean);

          const mode = chooseImportMode();
          if (!mode) {
            showActionMessage('Import cancelled.', 'error');
            return;
          }

          if (mode === 'replace') {
            await idbClear();
            await idbBulkPut(sanitizedMaps);
          } else {
            await idbBulkPut(sanitizedMaps);
          }
          setLocalDataUpdatedAt(nowIso());
          markUnsynced(true);

          const maps = await idbGetAll();
          state.maps = sortedMaps(maps);
          state.currentMapId = state.maps[0]?.id || null;
          state.currentMap = state.maps[0] ? JSON.parse(JSON.stringify(state.maps[0])) : null;
          markDirty(false);
          renderAll();
          showActionMessage(`Imported ${sanitizedMaps.length} MAP(s) using ${mode.toUpperCase()} mode.`);
        } catch (err) {
          console.error(err);
          showActionMessage('Import failed. Please try again.', 'error');
        } finally {
          el.importJsonInput.value = '';
        }
      }

      function sortedMaps(list) {
        const toText = (v) => String(v || '').toLowerCase();
        return [...list].sort((a, b) => {
          if (state.sortBy === 'updatedAt') return new Date(b.updatedAt || 0) - new Date(a.updatedAt || 0);
          if (state.sortBy === 'health') return calculateDealHealth(b).score - calculateDealHealth(a).score;
          if (state.sortBy === 'closeDate') return new Date(a.closeDate || '2100-01-01') - new Date(b.closeDate || '2100-01-01');
          if (state.sortBy === 'dealValue') return Number(b.dealValue || 0) - Number(a.dealValue || 0);
          return toText(a[state.sortBy]).localeCompare(toText(b[state.sortBy]));
        });
      }

      function filteredMaps() {
        const q = state.search.trim().toLowerCase();
        const maps = state.maps.filter((m) => {
          const searchMatch = !q || [m.opportunityName, m.accountName, m.salesOwner, m.champion]
            .some((v) => String(v || '').toLowerCase().includes(q));
          const healthMatch = !state.filters.overallHealth || calculateDealHealth(m).healthLabel === state.filters.overallHealth;
          const ownerMatch = !state.filters.salesOwner || m.salesOwner === state.filters.salesOwner;
          const forecastMatch = !state.filters.forecastCategory || m.forecastCategory === state.filters.forecastCategory;
          return searchMatch && healthMatch && ownerMatch && forecastMatch;
        });
        return sortedMaps(maps);
      }

      function getCurrentStoredMap() {
        return state.maps.find((m) => m.id === state.currentMapId) || null;
      }

      function setCurrentMap(id) {
        const found = state.maps.find((m) => m.id === id);
        if (!found) return;
        state.currentMapId = id;
        state.currentMap = JSON.parse(JSON.stringify(found));
        markDirty(false);
        renderAll();
      }

      function scheduleAutosave() {
        if (!state.currentMap) return;
        if (autosaveTimer) clearTimeout(autosaveTimer);
        autosaveTimer = setTimeout(async () => {
          try {
            setLocalStatus('saving');
            await saveCurrent({ silentValidation: true, isAutosave: true });
          } catch (err) {
            console.error(err);
            setLocalStatus('error', 'Local autosave failed');
          }
        }, AUTOSAVE_DELAY_MS);
      }

      function updateCurrentField(key, value) {
        if (!state.currentMap) return;
        state.currentMap[key] = value;
        markDirty(true);
        scheduleAutosave();
        renderSidebar();
      }

      function normalizeRow(arrayKey, rowIndex) {
        const colCount = TABLE_SCHEMAS[arrayKey].length;
        if (!Array.isArray(state.currentMap[arrayKey])) state.currentMap[arrayKey] = [];
        if (!Array.isArray(state.currentMap[arrayKey][rowIndex])) {
          state.currentMap[arrayKey][rowIndex] = Array(colCount).fill('');
        }
        for (let i = 0; i < colCount; i += 1) {
          if (typeof state.currentMap[arrayKey][rowIndex][i] === 'undefined' || state.currentMap[arrayKey][rowIndex][i] === null) {
            state.currentMap[arrayKey][rowIndex][i] = '';
          }
        }
      }

      function updateTableCell(arrayKey, rowIndex, colIndex, value) {
        if (!state.currentMap) return;
        normalizeRow(arrayKey, rowIndex);
        state.currentMap[arrayKey][rowIndex][colIndex] = value;
        if (arrayKey === 'meddpicScorecard') {
          syncSummaryRolesFromScorecard(state.currentMap);
        }
        markDirty(true);
        scheduleAutosave();
      }

      function addTableRow(arrayKey, focusIndex = null) {
        if (!state.currentMap) return;
        const colCount = TABLE_SCHEMAS[arrayKey].length;
        if (!Array.isArray(state.currentMap[arrayKey])) state.currentMap[arrayKey] = [];
        state.currentMap[arrayKey].push(Array(colCount).fill(''));
        markDirty(true);
        scheduleAutosave();
        renderPanels();
        if (focusIndex !== null) {
          const sel = `[data-cell="${arrayKey}-${focusIndex}-0"]`;
          const firstCell = el.panels.querySelector(sel);
          if (firstCell) firstCell.focus();
        }
      }

      function removeTableRow(arrayKey, index) {
        if (!state.currentMap || !Array.isArray(state.currentMap[arrayKey])) return;
        state.currentMap[arrayKey].splice(index, 1);
        markDirty(true);
        scheduleAutosave();
        renderPanels();
      }

      function fillSelectWithUniqueValues(selectEl, values, currentValue = '') {
        const options = ['<option value="">All</option>'];
        values.forEach((val) => {
          options.push(`<option value="${escapeHtml(val)}">${escapeHtml(val)}</option>`);
        });
        selectEl.innerHTML = options.join('');
        selectEl.value = currentValue;
      }

      function refreshSidebarFilterOptions() {
        const uniqueHealth = [...new Set(state.maps.map((m) => calculateDealHealth(m).healthLabel).filter(Boolean))].sort();
        const uniqueOwners = [...new Set(state.maps.map((m) => (m.salesOwner || '').trim()).filter(Boolean))].sort();
        const uniqueForecast = [...new Set(state.maps.map((m) => (m.forecastCategory || '').trim()).filter(Boolean))].sort();

        fillSelectWithUniqueValues(el.filterHealth, uniqueHealth, state.filters.overallHealth);
        fillSelectWithUniqueValues(el.filterOwner, uniqueOwners, state.filters.salesOwner);
        fillSelectWithUniqueValues(el.filterForecast, uniqueForecast, state.filters.forecastCategory);

        refreshSidebarFilterOptions();
        refreshFilterToggleUi();

        if (!iso) return '-';
        const d = new Date(iso);
        if (Number.isNaN(d.getTime())) return '-';
        return d.toLocaleString();
      }

          b.addEventListener('click', () => {

      function createSelectControl(options, value, onChange) {
        const select = document.createElement('select');
        const blank = document.createElement('option');
        blank.value = '';
        blank.textContent = '-- Select --';
        select.appendChild(blank);
        options.forEach((opt) => {
          const option = document.createElement('option');

          select.appendChild(option);
